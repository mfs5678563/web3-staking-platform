<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIST Staking</title>

    <!-- 核心：钱包历史记录头像 100% 生效 -->
    <link rel="icon" href="https://i.imgur.com/G9tZ0Qa.png">
    <meta name="application-name" content="FIST Staking">
    <meta name="apple-mobile-web-app-title" content="FIST">
    <link rel="apple-touch-icon" href="https://i.imgur.com/G9tZ0Qa.png">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0f172a;color:#fff;padding:30px 20px}
        .box{background:#1e293b;padding:25px;border-radius:16px;margin-bottom:20px}
        h2{margin-bottom:18px;font-size:18px}
        input{width:100%;padding:14px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#fff;font-size:16px;margin-bottom:15px}
        button{width:100%;padding:14px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold}
    </style>
</head>

<body>
    <div class="box">
        <h2>FIST 质押</h2>
        <input type="number" placeholder="输入质押数量 (FIST)">
        <button>确认质押</button>
    </div>

    <div class="box">
        <h2>钱包</h2>
        <button style="background:#10b981">连接钱包</button>
    </div>
</body>
</html>
