<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIST Staking DApp</title>
<link rel="icon" href="https://i.imgur.com/9bRnK4D.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0b1220;color:#fff;padding:20px}
.container{max-width:600px;margin:40px auto}
.card{background:#151b28;padding:24px;border-radius:16px;margin-bottom:20px;border:1px solid #2a3241}
.title{font-size:20px;margin-bottom:16px;color:#eaf3ff}
.input-group{margin-bottom:16px}
label{display:block;margin-bottom:8px;color:#a9b8d1}
input{width:100%;padding:12px 16px;background:#0f1622;border:1px solid #2a3241;border-radius:10px;color:white;font-size:16px}
button{width:100%;padding:14px;background:#50b350;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
button:hover{background:#429b42}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 class="title">FIST 质押</h2>
    <div class="input-group">
      <label>质押数量 (FIST)</label>
      <input type="number" placeholder="输入 FIST 数量">
    </div>
    <button>确认质押</button>
  </div>

  <div class="card">
    <h2 class="title">钱包信息</h2>
    <p style="color:#a9b8d1;margin-bottom:8px">未连接钱包</p>
    <button style="background:#3b6ff5">连接钱包</button>
  </div>
</div>
</body>
</html>
