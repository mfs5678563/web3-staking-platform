<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Staking Platform | 代币质押复利生息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 导航栏 */
        nav {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .connect-wallet {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-wallet:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .wallet-connected {
            background: var(--secondary);
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        /* 数据概览卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 0.875rem;
            color: var(--success);
            margin-top: 0.25rem;
        }

        /* 质押操作区 */
        .staking-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .action-card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .max-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .stake-btn {
            background: var(--primary);
            color: white;
        }

        .stake-btn:hover {
            background: var(--primary-dark);
        }

        .unstake-btn {
            background: var(--warning);
            color: white;
        }

        .unstake-btn:hover {
            background: #d97706;
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 收益信息区 */
        .rewards-section {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .reward-item {
            text-align: center;
            padding: 1rem;
            background: var(--bg-main);
            border-radius: 8px;
        }

        .reward-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .reward-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .staking-section {
                grid-template-columns: 1fr;
            }
        }

        /* 加载/提示样式 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.25rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="logo">
            <span>🔗</span>
            <span>Web3 Staking</span>
        </div>
        <button class="connect-wallet" id="connectWalletBtn">连接钱包</button>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 数据概览 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">总质押量</div>
                <div class="stat-value" id="totalStaked">0.00 STK</div>
                <div class="stat-change">+0.00% (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">我的质押</div>
                <div class="stat-value" id="myStaked">0.00 STK</div>
                <div class="stat-change">已锁定</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">待领取收益</div>
                <div class="stat-value" id="pendingRewards">0.00 STK</div>
                <div class="stat-change">复利生息中</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">年化收益率</div>
                <div class="stat-value" id="apr">12.50%</div>
                <div class="stat-change">固定利率</div>
            </div>
        </div>

        <!-- 质押/解押操作区 -->
        <div class="staking-section">
            <!-- 质押 -->
            <div class="action-card">
                <h3 class="card-title">
                    <span>📥</span>
                    质押代币
                </h3>
                <div class="input-group">
                    <label class="input-label">质押数量 (STK)</label>
                    <div class="input-wrapper">
                        <input type="number" class="input-field" id="stakeAmount" placeholder="输入质押数量" min="0" step="0.01">
                        <button class="max-btn" id="stakeMaxBtn">MAX</button>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">钱包余额: <span id="stakeWalletBalance">0.00 STK</span></label>
                </div>
                <button class="action-btn stake-btn" id="stakeBtn">确认质押</button>
            </div>

            <!-- 解押 -->
            <div class="action-card">
                <h3 class="card-title">
                    <span>📤</span>
                    解押代币
                </h3>
                <div class="input-group">
                    <label class="input-label">解押数量 (STK)</label>
                    <div class="input-wrapper">
                        <input type="number" class="input-field" id="unstakeAmount" placeholder="输入解押数量" min="0" step="0.01">
                        <button class="max-btn" id="unstakeMaxBtn">MAX</button>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">可解押余额: <span id="unstakeAvailableBalance">0.00 STK</span></label>
                </div>
                <button class="action-btn unstake-btn" id="unstakeBtn">确认解押</button>
            </div>
        </div>

        <!-- 收益详情区 -->
        <div class="rewards-section">
            <h3 class="card-title">
                <span>💰</span>
                复利收益详情
            </h3>
            <div class="rewards-grid">
                <div class="reward-item">
                    <div class="reward-label">今日收益</div>
                    <div class="reward-value" id="dailyRewards">0.00 STK</div>
                </div>
                <div class="reward-item">
                    <div class="reward-label">累计收益</div>
                    <div class="reward-value" id="totalRewards">0.00 STK</div>
                </div>
                <div class="reward-item">
                    <div class="reward-label">下次复利结算</div>
                    <div class="reward-value" id="nextCompound">23:59:59</div>
                </div>
                <div class="reward-item">
                    <div class="reward-label">质押时长</div>
                    <div class="reward-value" id="stakeDuration">0天</div>
                </div>
            </div>
            <button class="action-btn stake-btn" id="claimRewardsBtn" style="margin-top: 1.5rem;">领取全部收益</button>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading" id="loading">
        <span>交易处理中...</span>
    </div>

    <!-- 提示弹窗 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局状态
        let walletAddress = null;
        let isWalletConnected = false;
        let userBalance = 0;
        let userStaked = 0;
        let pendingRewards = 0;
        const APR = 12.5; // 年化收益率

        // DOM 元素
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const stakeAmountInput = document.getElementById('stakeAmount');
        const stakeMaxBtn = document.getElementById('stakeMaxBtn');
        const stakeBtn = document.getElementById('stakeBtn');
        const unstakeAmountInput = document.getElementById('unstakeAmount');
        const unstakeMaxBtn = document.getElementById('unstakeMaxBtn');
        const unstakeBtn = document.getElementById('unstakeBtn');
        const claimRewardsBtn = document.getElementById('claimRewardsBtn');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');

        // 初始化数据
        function initData() {
            document.getElementById('totalStaked').textContent = '1,250,000.00 STK';
            document.getElementById('apr').textContent = `${APR.toFixed(2)}%`;
            updateUserUI();
            startCountdown();
        }

        // 更新用户UI
        function updateUserUI() {
            document.getElementById('myStaked').textContent = `${userStaked.toFixed(2)} STK`;
            document.getElementById('pendingRewards').textContent = `${pendingRewards.toFixed(2)} STK`;
            document.getElementById('stakeWalletBalance').textContent = `${userBalance.toFixed(2)} STK`;
            document.getElementById('unstakeAvailableBalance').textContent = `${userStaked.toFixed(2)} STK`;
            document.getElementById('dailyRewards').textContent = calculateDailyRewards(userStaked).toFixed(2) + ' STK';
            document.getElementById('totalRewards').textContent = pendingRewards.toFixed(2) + ' STK';
        }

        // 计算每日收益
        function calculateDailyRewards(stakedAmount) {
            return stakedAmount * (APR / 100) / 365;
        }

        // 倒计时
        function startCountdown() {
            const nextCompoundEl = document.getElementById('nextCompound');
            setInterval(() => {
                const now = new Date();
                const tomorrow = new Date(now);
                tomorrow.setHours(24, 0, 0, 0);
                const diff = tomorrow - now;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                nextCompoundEl.textContent = `${h}:${m}:${s}`;
            }, 1000);
        }

        // 钱包连接
        connectWalletBtn.addEventListener('click', async () => {
            if (isWalletConnected) {
                showToast('钱包已连接', 'success');
                return;
            }

            try {
                loading.style.display = 'flex';
                // 模拟钱包连接（真实环境替换为window.ethereum请求）
                await new Promise(resolve => setTimeout(resolve, 1500));
                walletAddress = '0x742d35Cc6634C0532925a3b8865Ca44E118b606';
                isWalletConnected = true;
                userBalance = 10000.00; // 模拟初始余额
                connectWalletBtn.textContent = `${walletAddress.slice(0, 6)}...${walletAddress.slice(-4)}`;
                connectWalletBtn.classList.add('wallet-connected');
                updateUserUI();
                showToast('钱包连接成功', 'success');
            } catch (error) {
                showToast('钱包连接失败', 'error');
            } finally {
                loading.style.display = 'none';
            }
        });

        // MAX按钮
        stakeMaxBtn.addEventListener('click', () => {
            stakeAmountInput.value = userBalance.toFixed(2);
        });

        unstakeMaxBtn.addEventListener('click', () => {
            unstakeAmountInput.value = userStaked.toFixed(2);
        });

        // 质押
        stakeBtn.addEventListener('click', async () => {
            const amount = parseFloat(stakeAmountInput.value);
            if (!isWalletConnected) {
                showToast('请先连接钱包', 'error');
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                showToast('请输入有效数量', 'error');
                return;
            }
            if (amount > userBalance) {
                showToast('余额不足', 'error');
                return;
            }

            try {
                loading.style.display = 'flex';
                // 模拟链上交易
                await new Promise(resolve => setTimeout(resolve, 2000));
                userBalance -= amount;
                userStaked += amount;
                stakeAmountInput.value = '';
                updateUserUI();
                showToast(`成功质押 ${amount.toFixed(2)} STK`, 'success');
            } catch (error) {
                showToast('质押失败', 'error');
            } finally {
                loading.style.display = 'none';
            }
        });

        // 解押
        unstakeBtn.addEventListener('click', async () => {
            const amount = parseFloat(unstakeAmountInput.value);
            if (!isWalletConnected) {
                showToast('请先连接钱包', 'error');
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                showToast('请输入有效数量', 'error');
                return;
            }
            if (amount > userStaked) {
                showToast('可解押余额不足', 'error');
                return;
            }

            try {
                loading.style.display = 'flex';
                // 模拟链上交易
                await new Promise(resolve => setTimeout(resolve, 2000));
                userStaked -= amount;
                userBalance += amount;
                unstakeAmountInput.value = '';
                updateUserUI();
                showToast(`成功解押 ${amount.toFixed(2)} STK`, 'success');
            } catch (error) {
                showToast('解押失败', 'error');
            } finally {
                loading.style.display = 'none';
            }
        });

        // 领取收益
        claimRewardsBtn.addEventListener('click', async () => {
            if (!isWalletConnected) {
                showToast('请先连接钱包', 'error');
                return;
            }
            if (pendingRewards <= 0) {
                showToast('暂无待领取收益', 'error');
                return;
            }

            try {
                loading.style.display = 'flex';
                // 模拟链上交易
                await new Promise(resolve => setTimeout(resolve, 2000));
                userBalance += pendingRewards;
                pendingRewards = 0;
                updateUserUI();
                showToast(`成功领取 ${pendingRewards.toFixed(2)} STK 收益`, 'success');
            } catch (error) {
                showToast('领取失败', 'error');
            } finally {
                loading.style.display = 'none';
            }
        });

        // 提示弹窗
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 初始化
        initData();
    </script>
</body>
</html>
