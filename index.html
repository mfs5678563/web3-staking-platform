<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTM 质押挖矿（真质押版）</title>

<script src="https://cdn.ethers.org/lib-ethers/6.13.0/ethers.umd.min.js"></script>

<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;text-align:center}
.box{max-width:500px;margin:30px auto;padding:20px;background:#111827;border-radius:16px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#ffd700;color:#000;font-weight:bold}
.info{margin-top:10px;color:#aaa}
</style>
</head>

<body>

<div class="box">
<h2>DTM 质押挖矿</h2>

<button onclick="connect()">连接钱包</button>

<div class="info">地址：<span id="addr">-</span></div>
<div class="info">DTM余额：<span id="bal">0</span></div>
<div class="info">已质押：<span id="staked">0</span></div>
<div class="info">待收益：<span id="reward">0</span></div>

<input id="amt" placeholder="输入数量">

<button onclick="approve()">授权</button>
<button onclick="stake()">质押</button>
<button onclick="unstake()">解押</button>
<button onclick="claim()">领取收益</button>

</div>

<script>
// ====== 改这里 ======
const DTM = "0x050d384c9f577296301e4bdebbddf1164bcf6f12";
const STAKING = "0x1160a8dbdfc52407ba1aeba104f673db7d22eb4f"; // 你的质押合约地址
const DEC = 18;

// ====== ABI ======
const ERC20_ABI = [
 "function approve(address,uint256) external returns(bool)",
 "function balanceOf(address) view returns(uint256)"
];

const STAKE_ABI = [
 "function stake(uint256)",
 "function unstake(uint256)",
 "function claim()",
 "function pendingReward(address) view returns(uint256)",
 "function users(address) view returns(uint256 amount,uint256 rewardDebt)"
];

// ====== 全局 ======
let provider, signer, addr;
let dtm, staking;

// ====== 连接钱包 ======
async function connect(){
 if(!window.ethereum) return alert("请安装钱包");

 provider = new ethers.BrowserProvider(window.ethereum);
 await provider.send("eth_requestAccounts",[]);
 signer = await provider.getSigner();
 addr = await signer.getAddress();

 dtm = new ethers.Contract(DTM, ERC20_ABI, signer);
 staking = new ethers.Contract(STAKING, STAKE_ABI, signer);

 document.getElementById("addr").innerText =
  addr.slice(0,6)+"..."+addr.slice(-4);

 load();
 setInterval(load,3000);
}

// ====== 加载数据 ======
async function load(){
 if(!addr) return;

 const bal = await dtm.balanceOf(addr);
 document.getElementById("bal").innerText =
  ethers.formatUnits(bal,DEC);

 const user = await staking.users(addr);
 document.getElementById("staked").innerText =
  ethers.formatUnits(user.amount,DEC);

 const reward = await staking.pendingReward(addr);
 document.getElementById("reward").innerText =
  ethers.formatUnits(reward,DEC);
}

// ====== 授权 ======
async function approve(){
 await dtm.approve(STAKING, ethers.MaxUint256);
 alert("授权成功");
}

// ====== 质押 ======
async function stake(){
 const val = document.getElementById("amt").value;
 if(!val) return alert("输入数量");

 const v = ethers.parseUnits(val,DEC);
 await staking.stake(v);

 alert("质押成功");
}

// ====== 解押 ======
async function unstake(){
 const val = document.getElementById("amt").value;
 if(!val) return alert("输入数量");

 const v = ethers.parseUnits(val,DEC);
 await staking.unstake(v);

 alert("解押成功");
}

// ====== 领取 ======
async function claim(){
 await staking.claim();
 alert("领取成功");
}
</script>

</body>
</html>
